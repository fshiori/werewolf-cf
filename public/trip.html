<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>身份登錄 - Werewolf CF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      text-align: center;
    }

    .header h1 {
      color: #1e3c72;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .tab {
      flex: 1;
      padding: 14px;
      background: white;
      border: none;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      font-size: 15px;
      color: #555;
      font-family: inherit;
    }

    .tab:hover {
      background: #f8f9fa;
    }

    .tab.active {
      background: #667eea;
      color: white;
    }

    /* Cards */
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .card h2 {
      color: #1e3c72;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
    }

    /* Forms */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }

    .form-row {
      display: flex;
      gap: 15px;
    }

    .form-row .form-group {
      flex: 1;
    }

    /* Buttons */
    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
      font-family: inherit;
      font-weight: 600;
    }

    button:hover {
      background: #5568d3;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    button.secondary {
      background: #6c757d;
    }

    button.secondary:hover {
      background: #5a6268;
    }

    button.danger {
      background: #f44336;
    }

    button.danger:hover {
      background: #d32f2f;
    }

    /* Alerts */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .alert.show {
      display: block;
    }

    .alert.error {
      background: #ffebee;
      color: #c62828;
    }

    .alert.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .alert.info {
      background: #e3f2fd;
      color: #1565c0;
    }

    /* Tab content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Trip display */
    .trip-display {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin-top: 20px;
    }

    .trip-display .trip-code {
      font-family: 'Courier New', monospace;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      margin: 10px 0;
    }

    .trip-display .trip-label {
      font-size: 12px;
      opacity: 0.8;
    }

    .trip-display .trip-status {
      margin-top: 8px;
      font-size: 13px;
    }

    .trip-display .trip-status.new {
      color: #81c784;
    }

    .trip-display .trip-status.existing {
      color: #ffb74d;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-item {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .stat-item .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: #1e3c72;
    }

    .stat-item .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    .stat-item.highlight {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .stat-item.highlight .stat-value {
      color: white;
    }

    .stat-item.highlight .stat-label {
      color: rgba(255,255,255,0.8);
    }

    /* Role history table */
    .role-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .role-table th,
    .role-table td {
      padding: 10px 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    .role-table th {
      background: #f8f9fa;
      color: #555;
      font-weight: 600;
      font-size: 13px;
    }

    .role-table td {
      font-size: 14px;
    }

    .role-table tr:hover {
      background: #f8f9fa;
    }

    .role-name {
      font-weight: 600;
      color: #1e3c72;
    }

    .role-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      min-width: 100px;
    }

    .role-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Trip list */
    .trip-list {
      margin-top: 15px;
    }

    .trip-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }

    .trip-list-item:hover {
      background: #f8f9fa;
    }

    .trip-list-item:last-child {
      border-bottom: none;
    }

    .trip-list-id {
      color: #999;
      font-size: 13px;
      width: 50px;
    }

    .trip-list-code {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      color: #1e3c72;
      cursor: pointer;
    }

    .trip-list-code:hover {
      color: #667eea;
      text-decoration: underline;
    }

    .trip-list-count {
      color: #888;
      font-size: 13px;
    }

    /* Search */
    .search-form {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .search-form input {
      flex: 1;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }

    .pagination button {
      padding: 8px 14px;
      font-size: 13px;
      background: #f8f9fa;
      color: #333;
    }

    .pagination button:hover {
      background: #e0e0e0;
    }

    .pagination button.active {
      background: #667eea;
      color: white;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state .emoji {
      font-size: 48px;
      margin-bottom: 10px;
    }

    /* Back link */
    .back-link {
      display: inline-block;
      padding: 10px 20px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 6px;
      margin-bottom: 20px;
      transition: all 0.3s;
      font-size: 14px;
    }

    .back-link:hover {
      background: #f8f9fa;
      transform: translateX(-5px);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .tabs {
        flex-direction: column;
      }

      .form-row {
        flex-direction: column;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .search-form {
        flex-direction: column;
      }
    }

    /* Verification result */
    .verify-result {
      text-align: center;
      padding: 30px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .verify-result.valid {
      background: #e8f5e9;
      border: 2px solid #4caf50;
    }

    .verify-result.invalid {
      background: #ffebee;
      border: 2px solid #f44336;
    }

    .verify-result .result-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .verify-result .result-text {
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首頁</a>

    <div class="header">
      <h1>🔐 身份登錄</h1>
      <p>管理您的 Tripcode — 註冊、驗證並查看遊戲統計</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('register')">註冊 Trip</button>
      <button class="tab" onclick="switchTab('verify')">驗證 Trip</button>
      <button class="tab" onclick="switchTab('lookup')">查詢統計</button>
      <button class="tab" onclick="switchTab('list')">登錄列表</button>
    </div>

    <!-- Tab: Register -->
    <div id="tab-register" class="tab-content active">
      <div class="card">
        <h2>📝 登錄選項</h2>
        <div id="regAlert" class="alert"></div>

        <p style="color:#666; margin-bottom:20px; line-height:1.6;">
          Trip 是一個密碼產生的唯一識別碼，用來驗證您的身份。<br>
          請設定一個密碼，系統會自動產生對應的 Tripcode。<br>
          <strong>請妥善保管密碼</strong>，相同密碼永遠產生相同的 Trip。
        </p>

        <div class="form-group">
          <label for="regPassword">管理密碼</label>
          <input type="password" id="regPassword" placeholder="請輸入密碼（至少6字元，建議含英文和數字）" autocomplete="new-password">
          <div class="form-hint">此密碼用於驗證 Trip 身份，請勿過於簡單以免遭破解</div>
        </div>

        <button onclick="registerTrip()">送出</button>

        <div id="regResult" style="display:none;"></div>
      </div>
    </div>

    <!-- Tab: Verify -->
    <div id="tab-verify" class="tab-content">
      <div class="card">
        <h2>✅ 驗證 Trip</h2>
        <div id="verifyAlert" class="alert"></div>

        <p style="color:#666; margin-bottom:20px; line-height:1.6;">
          輸入 Trip 與對應密碼來驗證身份是否匹配。
        </p>

        <div class="form-group">
          <label for="verifyTrip">Tripcode</label>
          <input type="text" id="verifyTrip" placeholder="輸入 Tripcode">
        </div>

        <div class="form-group">
          <label for="verifyPassword">管理密碼</label>
          <input type="password" id="verifyPassword" placeholder="輸入管理密碼" autocomplete="current-password">
        </div>

        <button onclick="verifyTrip()">驗證</button>

        <div id="verifyResult" style="display:none;"></div>
      </div>
    </div>

    <!-- Tab: Lookup Stats -->
    <div id="tab-lookup" class="tab-content">
      <div class="card">
        <h2>📊 查詢 Trip 統計</h2>

        <div class="search-form">
          <input type="text" id="lookupTrip" placeholder="輸入 Tripcode 查看遊戲統計">
          <button onclick="lookupTrip()">查詢</button>
        </div>

        <div id="lookupContent"></div>
      </div>
    </div>

    <!-- Tab: List -->
    <div id="tab-list" class="tab-content">
      <div class="card">
        <h2>📋 登錄列表</h2>

        <div class="search-form">
          <input type="text" id="listSearch" placeholder="搜尋 Trip...">
          <button onclick="searchTripList()">搜尋</button>
        </div>

        <div id="listContent">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    // ==================== Tab Navigation ====================
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      const tabMap = { register: 0, verify: 1, lookup: 2, list: 3 };
      document.querySelector('.tabs').children[tabMap[tab]].classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');

      // Auto-load list on tab switch
      if (tab === 'list') {
        loadTripList();
      }
    }

    // ==================== Register ====================
    async function registerTrip() {
      const password = document.getElementById('regPassword').value.trim();
      const alertEl = document.getElementById('regAlert');
      const resultEl = document.getElementById('regResult');

      if (!password) {
        showAlert(alertEl, 'error', '請輸入密碼');
        return;
      }

      if (password.length < 6) {
        showAlert(alertEl, 'error', '密碼長度至少6字元');
        return;
      }

      resultEl.style.display = 'none';
      alertEl.classList.remove('show');

      try {
        const response = await fetch(`${API_BASE}/api/trip/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (response.ok) {
          resultEl.innerHTML = `
            <div class="trip-display">
              <div class="trip-label">您的 Tripcode</div>
              <div class="trip-code">${escapeHtml(data.trip)}</div>
              <div class="trip-status ${data.registered ? 'new' : 'existing'}">
                ${data.registered ? '✨ 全新註冊成功' : '⚠️ 此 Trip 已存在（冪等）'}
              </div>
            </div>
            <p style="text-align:center; color:#888; margin-top:12px; font-size:13px;">
              請記住此 Tripcode 及您的密碼。您可以在遊戲中使用此 Trip 來識別身份。
            </p>
          `;
          resultEl.style.display = 'block';
          showAlert(alertEl, 'success', data.registered ? 'Trip 註冊成功！' : '此 Trip 已註冊過。');
        } else {
          showAlert(alertEl, 'error', data.error || '註冊失敗');
        }
      } catch (error) {
        console.error('Register error:', error);
        showAlert(alertEl, 'error', '網路錯誤，請稍後再試');
      }
    }

    // ==================== Verify ====================
    async function verifyTrip() {
      const trip = document.getElementById('verifyTrip').value.trim();
      const password = document.getElementById('verifyPassword').value;
      const alertEl = document.getElementById('verifyAlert');
      const resultEl = document.getElementById('verifyResult');

      if (!trip || !password) {
        showAlert(alertEl, 'error', '請輸入 Trip 與密碼');
        return;
      }

      resultEl.style.display = 'none';
      alertEl.classList.remove('show');

      try {
        const response = await fetch(`${API_BASE}/api/trip/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trip, password })
        });

        const data = await response.json();

        if (response.ok) {
          if (data.valid) {
            resultEl.innerHTML = `
              <div class="verify-result valid">
                <div class="result-icon">✅</div>
                <div class="result-text">驗證成功！身份匹配</div>
                <div style="color:#555; margin-top:8px; font-size:13px;">
                  Trip: <code>${escapeHtml(trip)}</code> 已通過驗證
                </div>
              </div>
            `;
          } else {
            resultEl.innerHTML = `
              <div class="verify-result invalid">
                <div class="result-icon">❌</div>
                <div class="result-text">驗證失敗</div>
                <div style="color:#555; margin-top:8px; font-size:13px;">
                  Trip 與密碼不匹配，或此 Trip 尚未註冊
                </div>
              </div>
            `;
          }
          resultEl.style.display = 'block';
        } else {
          showAlert(alertEl, 'error', data.error || '驗證失敗');
        }
      } catch (error) {
        console.error('Verify error:', error);
        showAlert(alertEl, 'error', '網路錯誤，請稍後再試');
      }
    }

    // ==================== Lookup Stats ====================
    async function lookupTrip() {
      const trip = document.getElementById('lookupTrip').value.trim();
      const contentEl = document.getElementById('lookupContent');

      if (!trip) {
        contentEl.innerHTML = '<div class="alert error show">請輸入 Tripcode</div>';
        return;
      }

      contentEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      try {
        const response = await fetch(`${API_BASE}/api/stats/${encodeURIComponent(trip)}`);
        const data = await response.json();

        if (!response.ok) {
          contentEl.innerHTML = `<div class="alert error show">${escapeHtml(data.error || '查詢失敗')}</div>`;
          return;
        }

        renderTripStats(contentEl, data);
      } catch (error) {
        console.error('Lookup error:', error);
        contentEl.innerHTML = '<div class="alert error show">網路錯誤，請稍後再試</div>';
      }
    }

    function renderTripStats(container, data) {
      if (!data.totalGames && !data.games_played) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="emoji">🎲</div>
            <p>此 Trip 尚無遊戲紀錄</p>
            <p style="font-size:13px; color:#bbb; margin-top:8px;">${escapeHtml(data.trip || '')}</p>
          </div>
        `;
        return;
      }

      const totalGames = data.total_games || data.games_played || 0;
      const humanWins = data.human_wins || 0;
      const wolfWins = data.wolf_wins || 0;
      const foxWins = data.fox_wins || 0;
      const totalWins = humanWins + wolfWins + foxWins;
      const score = data.score || 0;
      const survivorCount = data.survivor_count || 0;
      const lastPlayed = data.last_played ? new Date(data.last_played).toLocaleString('zh-TW') : '-';
      const roleHistory = data.roleHistory || (data.role_history ? JSON.parse(data.role_history) : {});

      const winRate = totalGames > 0 ? ((totalWins / totalGames) * 100).toFixed(1) : '0.0';
      const survivorRate = totalGames > 0 ? ((survivorCount / totalGames) * 100).toFixed(1) : '0.0';

      // Role name mapping
      const roleNames = {
        'human': '村民', 'wolf': '狼人', 'wolf_partner': '狼人夥伴',
        'mage': '預言家', 'necromancer': '靈媒', 'mad': '狂人',
        'guard': '獵人', 'common': '共有者', 'common_partner': '共有者夥伴',
        'fox': '妖狐', 'betr': '背德者', 'betr_partner': '背德者夥伴',
        'fosi': '子狐', 'poison': '埋毒者', 'wfbig': '大狼',
        'authority': '權力者', 'decide': '決定者', 'cat': '貓又'
      };

      // Build role history HTML
      const roleEntries = Object.entries(roleHistory).sort((a, b) => b[1] - a[1]);
      const maxRoleCount = roleEntries.length > 0 ? roleEntries[0][1] : 1;

      let roleTableHtml = '';
      if (roleEntries.length > 0) {
        roleTableHtml = `
          <h3 style="color:#1e3c72; margin-bottom:15px;">🎭 角色分布</h3>
          <table class="role-table">
            <thead>
              <tr><th>角色</th><th>次數</th><th style="width:40%">比例</th></tr>
            </thead>
            <tbody>
              ${roleEntries.map(([role, count]) => {
                const pct = ((count / maxRoleCount) * 100).toFixed(0);
                const name = roleNames[role] || role;
                return `
                  <tr>
                    <td><span class="role-name">${escapeHtml(name)}</span></td>
                    <td>${count} 次</td>
                    <td><div class="role-bar"><div class="role-bar-fill" style="width:${pct}%"></div></div></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;
      }

      container.innerHTML = `
        <div class="stats-grid">
          <div class="stat-item highlight">
            <div class="stat-value">${score}</div>
            <div class="stat-label">評分</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${totalGames}</div>
            <div class="stat-label">總局數</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${winRate}%</div>
            <div class="stat-label">勝率</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${survivorRate}%</div>
            <div class="stat-label">生存率</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${humanWins}</div>
            <div class="stat-label">人側勝</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${wolfWins}</div>
            <div class="stat-label">狼側勝</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${foxWins}</div>
            <div class="stat-label">狐側勝</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="font-size:14px;">${lastPlayed}</div>
            <div class="stat-label">最後遊玩</div>
          </div>
        </div>
        ${roleTableHtml}
      `;
    }

    // ==================== Trip List ====================
    let listPage = 1;
    const listPageSize = 15;
    let listSearchTerm = '';

    function searchTripList() {
      listSearchTerm = document.getElementById('listSearch').value.trim();
      listPage = 1;
      loadTripList();
    }

    async function loadTripList() {
      const contentEl = document.getElementById('listContent');
      contentEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      try {
        // Use leaderboard endpoint to list trips (ordered by score desc)
        const response = await fetch(`${API_BASE}/api/leaderboard?limit=500`);
        const data = await response.json();

        if (!response.ok || !data.leaderboard) {
          contentEl.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>載入失敗</p></div>';
          return;
        }

        let trips = data.leaderboard;

        // Filter by search term if provided
        if (listSearchTerm) {
          trips = trips.filter(t => t.trip.toLowerCase().includes(listSearchTerm.toLowerCase()));
        }

        if (trips.length === 0) {
          contentEl.innerHTML = `
            <div class="empty-state">
              <div class="emoji">🔍</div>
              <p>${listSearchTerm ? '找不到匹配的 Trip' : '尚無登錄資料'}</p>
            </div>
          `;
          return;
        }

        // Paginate
        const totalPages = Math.ceil(trips.length / listPageSize);
        const pageItems = trips.slice((listPage - 1) * listPageSize, listPage * listPageSize);

        const listHtml = pageItems.map((t, idx) => `
          <div class="trip-list-item" onclick="viewTripFromList('${escapeHtml(t.trip)}')">
            <span class="trip-list-id">#${(listPage - 1) * listPageSize + idx + 1}</span>
            <span class="trip-list-code">${escapeHtml(t.trip)}</span>
            <span class="trip-list-count">${t.total_games || t.games_played || 0} 局 · ${t.score || 0} 分</span>
          </div>
        `).join('');

        let paginationHtml = '';
        if (totalPages > 1) {
          const pages = [];
          for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= listPage - 2 && i <= listPage + 2)) {
              pages.push(i);
            } else if (pages[pages.length - 1] !== '...') {
              pages.push('...');
            }
          }

          paginationHtml = `
            <div class="pagination">
              <button onclick="changeListPage(${Math.max(1, listPage - 1)})" ${listPage <= 1 ? 'disabled' : ''}>上一頁</button>
              ${pages.map(p => p === '...' ? '<button disabled>…</button>'
                : `<button class="${p === listPage ? 'active' : ''}" onclick="changeListPage(${p})">${p}</button>`
              ).join('')}
              <button onclick="changeListPage(${Math.min(totalPages, listPage + 1)})" ${listPage >= totalPages ? 'disabled' : ''}>下一頁</button>
            </div>
          `;
        }

        contentEl.innerHTML = `
          <div class="trip-list">${listHtml}</div>
          ${paginationHtml}
          <div style="text-align:center; color:#999; margin-top:12px; font-size:13px;">
            共 ${trips.length} 筆登錄 · 點擊 Trip 查看統計
          </div>
        `;
      } catch (error) {
        console.error('Load list error:', error);
        contentEl.innerHTML = '<div class="alert error show">網路錯誤，請稍後再試</div>';
      }
    }

    function changeListPage(page) {
      listPage = page;
      loadTripList();
    }

    function viewTripFromList(trip) {
      // Switch to lookup tab and auto-search
      document.getElementById('lookupTrip').value = trip;
      switchTab('lookup');
      lookupTrip();
    }

    // ==================== Helpers ====================
    function showAlert(el, type, message) {
      el.textContent = message;
      el.className = `alert ${type} show`;
      setTimeout(() => el.classList.remove('show'), type === 'error' ? 8000 : 4000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Enter key support
    document.getElementById('regPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') registerTrip();
    });

    document.getElementById('verifyTrip').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('verifyPassword').focus();
    });

    document.getElementById('verifyPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyTrip();
    });

    document.getElementById('lookupTrip').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') lookupTrip();
    });

    document.getElementById('listSearch').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchTripList();
    });
  </script>
</body>
</html>
