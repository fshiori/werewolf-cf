<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理面板 - Werewolf CF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      text-align: center;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 15px;
      background: white;
      border: 2px solid #667eea;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .tab.active {
      background: #667eea;
      color: white;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: none;
    }

    .card.active {
      display: block;
    }

    .card h2 {
      color: #1e3c72;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
    }

    input[type="text"], textarea, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button.danger {
      background: #f44336;
    }

    button.danger:hover {
      background: #d32f2f;
    }

    button.success {
      background: #4caf50;
    }

    button.success:hover {
      background: #45a049;
    }

    .list {
      margin-top: 20px;
    }

    .list-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-info {
      flex: 1;
    }

    .item-trip {
      font-weight: bold;
      color: #1e3c72;
      margin-bottom: 5px;
    }

    .item-meta {
      font-size: 12px;
      color: #999;
    }

    .back-link {
      display: inline-block;
      padding: 10px 20px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 6px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .back-link:hover {
      background: #f8f9fa;
      transform: translateX(-5px);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .login-form {
      max-width: 400px;
      margin: 0 auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      color: white;
    }

    .stat-value {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首頁</a>

    <div class="header">
      <h1>🛡️ 管理面板</h1>
      <p>管理黑白名單和系統設定</p>
    </div>

    <!-- 登入表單 -->
    <div id="loginCard" class="card active">
      <h2>🔐 管理員登入</h2>
      <div id="loginError" class="error"></div>

      <div class="login-form">
        <div class="form-group">
          <label for="adminPassword">管理員密碼</label>
          <input type="password" id="adminPassword" placeholder="輸入管理員密碼">
        </div>

        <button onclick="login()" style="width: 100%;">登入</button>
      </div>
    </div>

    <!-- 主面板 -->
    <div id="mainPanel">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('blacklist')">黑名單</div>
        <div class="tab" onclick="switchTab('whitelist')">白名單</div>
        <div class="tab" onclick="switchTab('stats')">統計資料</div>
      </div>

      <!-- 黑名單 -->
      <div id="blacklistCard" class="card active">
        <h2>🚫 黑名單管理</h2>
        <div id="blacklistError" class="error"></div>
        <div id="blacklistSuccess" class="success"></div>

        <div class="form-group">
          <label for="blacklistTrip">Tripcode</label>
          <input type="text" id="blacklistTrip" placeholder="輸入要封鎖的 Tripcode">
        </div>

        <div class="form-group">
          <label for="blacklistReason">原因</label>
          <textarea id="blacklistReason" placeholder="封鎖原因"></textarea>
        </div>

        <div class="form-group">
          <label for="blacklistCreator">建立者</label>
          <input type="text" id="blacklistCreator" placeholder="管理員名稱">
        </div>

        <button class="danger" onclick="addToBlacklist()">新增到黑名單</button>

        <div id="blacklistList" class="list">
          <div class="loading">載入中...</div>
        </div>
      </div>

      <!-- 白名單 -->
      <div id="whitelistCard" class="card">
        <h2>✅ 白名單管理</h2>
        <div id="whitelistError" class="error"></div>
        <div id="whitelistSuccess" class="success"></div>

        <div class="form-group">
          <label for="whitelistTrip">Tripcode</label>
          <input type="text" id="whitelistTrip" placeholder="輸入要加入白名單的 Tripcode">
        </div>

        <div class="form-group">
          <label for="whitelistTrust">信任等級 (0-10)</label>
          <input type="number" id="whitelistTrust" min="0" max="10" value="5">
        </div>

        <div class="form-group">
          <label for="whitelistNotes">備註</label>
          <textarea id="whitelistNotes" placeholder="玩家特徵、信譽等"></textarea>
        </div>

        <button class="success" onclick="addToWhitelist()">新增到白名單</button>

        <div id="whitelistList" class="list">
          <div class="loading">載入中...</div>
        </div>
      </div>

      <!-- 統計資料 -->
      <div id="statsCard" class="card">
        <h2>📊 統計資料</h2>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="totalBlacklist">0</div>
            <div class="stat-label">黑名單數量</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="totalWhitelist">0</div>
            <div class="stat-label">白名單數量</div>
          </div>
        </div>

        <button onclick="loadStats()">重新整理統計</button>
      </div>
    </div>
  </div>

  <script>
    let isAdmin = false;

    // 頁面載入時檢查登入狀態
    document.addEventListener('DOMContentLoaded', () => {
      checkAdminStatus();
    });

    // 檢查管理員狀態
    function checkAdminStatus() {
      const adminSession = localStorage.getItem('admin_session');
      if (adminSession) {
        isAdmin = true;
        showMainPanel();
      }
    }

    // 管理員登入
    async function login() {
      const password = document.getElementById('adminPassword').value;

      if (!password) {
        showLoginError('請輸入密碼');
        return;
      }

      try {
        const response = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('admin_session', data.sessionId);
          isAdmin = true;
          showMainPanel();
        } else {
          showLoginError(data.error || '登入失敗');
        }
      } catch (error) {
        console.error('Login error:', error);
        showLoginError('網路錯誤，請稍後再試');
      }
    }

    // 顯示主面板
    function showMainPanel() {
      document.getElementById('loginCard').classList.remove('active');
      document.getElementById('mainPanel').style.display = 'block';
      loadBlacklist();
      loadWhitelist();
      loadStats();
    }

    // 切換 Tab
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));

      if (tab === 'blacklist') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('blacklistCard').classList.add('active');
        loadBlacklist();
      } else if (tab === 'whitelist') {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('whitelistCard').classList.add('active');
        loadWhitelist();
      } else {
        document.querySelector('.tab:nth-child(3)').classList.add('active');
        document.getElementById('statsCard').classList.add('active');
        loadStats();
      }
    }

    // 新增到黑名單
    async function addToBlacklist() {
      const trip = document.getElementById('blacklistTrip').value.trim();
      const reason = document.getElementById('blacklistReason').value.trim();
      const createdBy = document.getElementById('blacklistCreator').value.trim();

      if (!trip) {
        showBlacklistError('請輸入 Tripcode');
        return;
      }

      try {
        const response = await fetch('/api/blacklist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trip, reason, createdBy })
        });

        const data = await response.json();

        if (data.success) {
          showBlacklistSuccess('已新增到黑名單');
          document.getElementById('blacklistTrip').value = '';
          document.getElementById('blacklistReason').value = '';
          loadBlacklist();
          loadStats();
        } else {
          showBlacklistError(data.error || '新增失敗');
        }
      } catch (error) {
        console.error('Add to blacklist error:', error);
        showBlacklistError('網路錯誤，請稍後再試');
      }
    }

    // 載入黑名單
    async function loadBlacklist() {
      try {
        const response = await fetch('/api/blacklist');
        const data = await response.json();

        const container = document.getElementById('blacklistList');

        if (data.blacklist && data.blacklist.length > 0) {
          container.innerHTML = data.blacklist.map(item => `
            <div class="list-item">
              <div class="item-info">
                <div class="item-trip"><code>${escapeHtml(item.trip)}</code></div>
                <div class="item-meta">
                  ${item.reason ? `原因: ${escapeHtml(item.reason)} | ` : ''}
                  ${item.created_by ? `建立者: ${escapeHtml(item.created_by)} | ` : ''}
                  ${new Date(item.created_at).toLocaleString('zh-TW')}
                </div>
              </div>
              <button class="danger" onclick="removeFromBlacklist(${item.id})">移除</button>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="empty-state">📭 黑名單為空</div>';
        }
      } catch (error) {
        console.error('Load blacklist error:', error);
        document.getElementById('blacklistList').innerHTML = '<div class="error">載入失敗</div>';
      }
    }

    // 從黑名單移除
    async function removeFromBlacklist(id) {
      if (!confirm('確定要從黑名單移除嗎？')) {
        return;
      }

      try {
        const response = await fetch(`/api/blacklist/${id}`, {
          method: 'DELETE'
        });

        const data = await response.json();

        if (data.success) {
          showBlacklistSuccess('已從黑名單移除');
          loadBlacklist();
          loadStats();
        } else {
          showBlacklistError(data.error || '移除失敗');
        }
      } catch (error) {
        console.error('Remove from blacklist error:', error);
        showBlacklistError('網路錯誤，請稍後再試');
      }
    }

    // 新增到白名單
    async function addToWhitelist() {
      const trip = document.getElementById('whitelistTrip').value.trim();
      const trustLevel = parseInt(document.getElementById('whitelistTrust').value);
      const notes = document.getElementById('whitelistNotes').value.trim();

      if (!trip) {
        showWhitelistError('請輸入 Tripcode');
        return;
      }

      try {
        const response = await fetch('/api/whitelist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trip, trustLevel, notes })
        });

        const data = await response.json();

        if (data.success) {
          showWhitelistSuccess('已新增到白名單');
          document.getElementById('whitelistTrip').value = '';
          document.getElementById('whitelistNotes').value = '';
          loadWhitelist();
          loadStats();
        } else {
          showWhitelistError(data.error || '新增失敗');
        }
      } catch (error) {
        console.error('Add to whitelist error:', error);
        showWhitelistError('網路錯誤，請稍後再試');
      }
    }

    // 載入白名單
    async function loadWhitelist() {
      try {
        const response = await fetch('/api/whitelist');
        const data = await response.json();

        const container = document.getElementById('whitelistList');

        if (data.whitelist && data.whitelist.length > 0) {
          container.innerHTML = data.whitelist.map(item => `
            <div class="list-item">
              <div class="item-info">
                <div class="item-trip"><code>${escapeHtml(item.trip)}</code></div>
                <div class="item-meta">
                  信任等級: ${item.trust_level}/10
                  ${item.notes ? ` | ${escapeHtml(item.notes)}` : ''}
                  | ${new Date(item.created_at).toLocaleString('zh-TW')}
                </div>
              </div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="empty-state">📭 白名單為空</div>';
        }
      } catch (error) {
        console.error('Load whitelist error:', error);
        document.getElementById('whitelistList').innerHTML = '<div class="error">載入失敗</div>';
      }
    }

    // 載入統計資料
    async function loadStats() {
      try {
        const [blacklistRes, whitelistRes] = await Promise.all([
          fetch('/api/blacklist'),
          fetch('/api/whitelist')
        ]);

        const blacklistData = await blacklistRes.json();
        const whitelistData = await whitelistRes.json();

        document.getElementById('totalBlacklist').textContent =
          (blacklistData.blacklist || []).length;
        document.getElementById('totalWhitelist').textContent =
          (whitelistData.whitelist || []).length;
      } catch (error) {
        console.error('Load stats error:', error);
      }
    }

    // 顯示錯誤訊息
    function showLoginError(message) {
      const errorEl = document.getElementById('loginError');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    function showBlacklistError(message) {
      const errorEl = document.getElementById('blacklistError');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    function showWhitelistError(message) {
      const errorEl = document.getElementById('whitelistError');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    // 顯示成功訊息
    function showBlacklistSuccess(message) {
      const successEl = document.getElementById('blacklistSuccess');
      successEl.textContent = message;
      successEl.classList.add('show');
      setTimeout(() => successEl.classList.remove('show'), 3000);
    }

    function showWhitelistSuccess(message) {
      const successEl = document.getElementById('whitelistSuccess');
      successEl.textContent = message;
      successEl.classList.add('show');
      setTimeout(() => successEl.classList.remove('show'), 3000);
    }

    // HTML 轉義
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Enter 鍵登入
    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>
</body>
</html>
