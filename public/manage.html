<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理面板 - Werewolf CF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      text-align: center;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 15px;
      background: white;
      border: 2px solid #667eea;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .tab.active {
      background: #667eea;
      color: white;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: none;
    }

    .card.active {
      display: block;
    }

    .card h2 {
      color: #1e3c72;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
    }

    input[type="text"], textarea, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button.danger {
      background: #f44336;
    }

    button.danger:hover {
      background: #d32f2f;
    }

    button.success {
      background: #4caf50;
    }

    button.success:hover {
      background: #45a049;
    }

    .list {
      margin-top: 20px;
    }

    .list-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-info {
      flex: 1;
    }

    .item-trip {
      font-weight: bold;
      color: #1e3c72;
      margin-bottom: 5px;
    }

    .item-meta {
      font-size: 12px;
      color: #999;
    }

    .back-link {
      display: inline-block;
      padding: 10px 20px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 6px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .back-link:hover {
      background: #f8f9fa;
      transform: translateX(-5px);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .login-form {
      max-width: 400px;
      margin: 0 auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      color: white;
    }

    .stat-value {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首頁</a>

    <div class="header">
      <h1>🛡️ 管理面板</h1>
      <p>管理黑白名單和系統設定</p>
    </div>

    <!-- 登入表單 -->
    <div id="loginCard" class="card active">
      <h2>🔐 管理員登入</h2>
      <div id="loginError" class="error"></div>

      <div class="login-form">
        <div class="form-group">
          <label for="adminUsername">管理員帳號</label>
          <input type="text" id="adminUsername" placeholder="輸入管理員帳號">
        </div>
        <div class="form-group">
          <label for="adminPassword">管理員密碼</label>
          <input type="password" id="adminPassword" placeholder="輸入管理員密碼">
        </div>

        <button onclick="login()" style="width: 100%;">登入</button>
      </div>
    </div>

    <!-- 主面板 -->
    <div id="mainPanel">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('bans')">IP 封鎖</div>
        <div class="tab" onclick="switchTab('rooms')">房間管理</div>
        <div class="tab" onclick="switchTab('stats')">統計資料</div>
      </div>

      <!-- IP 封鎖 -->
      <div id="bansCard" class="card active">
        <h2>🚫 IP 封鎖管理</h2>
        <div id="bansError" class="error"></div>
        <div id="bansSuccess" class="success"></div>

        <div class="form-group">
          <label for="banIp">IP 位址</label>
          <input type="text" id="banIp" placeholder="輸入要封鎖的 IP 位址">
        </div>

        <div class="form-group">
          <label for="banType">封鎖類型</label>
          <select id="banType">
            <option value="permanent">永久封鎖</option>
            <option value="temporary">暫時封鎖</option>
          </select>
        </div>

        <div class="form-group" id="banDurationGroup" style="display:none;">
          <label for="banDuration">封鎖時長（小時）</label>
          <input type="number" id="banDuration" min="1" value="24">
        </div>

        <div class="form-group">
          <label for="banReason">原因</label>
          <textarea id="banReason" placeholder="封鎖原因"></textarea>
        </div>

        <button class="danger" onclick="addBan()">新增封鎖</button>

        <div id="bansList" class="list">
          <div class="loading">載入中...</div>
        </div>
      </div>

      <!-- 房間管理 -->
      <div id="roomsCard" class="card">
        <h2>🏠 房間管理</h2>
        <div id="roomsError" class="error"></div>
        <div id="roomsSuccess" class="success"></div>

        <button onclick="loadRooms()">重新整理</button>

        <div id="roomsList" class="list">
          <div class="loading">載入中...</div>
        </div>
      </div>

      <!-- 統計資料 -->
      <div id="statsCard" class="card">
        <h2>📊 統計資料</h2>

        <div class="stats-grid" id="statsGrid">
          <div class="stat-box">
            <div class="stat-value" id="statTotalRooms">-</div>
            <div class="stat-label">總房間數</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="statActiveRooms">-</div>
            <div class="stat-label">活躍房間</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="statTotalPlayers">-</div>
            <div class="stat-label">總玩家數</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="statActivePlayers">-</div>
            <div class="stat-label">線上玩家</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="statTotalGames">-</div>
            <div class="stat-label">總遊戲數</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="statTotalBans">-</div>
            <div class="stat-label">封鎖數量</div>
          </div>
        </div>

        <button onclick="loadStats()">重新整理統計</button>
      </div>
    </div>
  </div>

  <script>
    // ===== Admin Auth =====
    let adminSessionId = localStorage.getItem('admin_session');
    let isAdmin = !!adminSessionId;

    function getAdminHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminSessionId };
    }

    // 管理員登入
    async function login() {
      const username = document.getElementById('adminUsername').value.trim();
      const password = document.getElementById('adminPassword').value;

      if (!username || !password) {
        showLoginError('請輸入帳號和密碼');
        return;
      }

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          adminSessionId = data.sessionId;
          localStorage.setItem('admin_session', data.sessionId);
          isAdmin = true;
          showMainPanel();
        } else {
          showLoginError(data.error || '登入失敗');
        }
      } catch (error) {
        console.error('Login error:', error);
        showLoginError('網路錯誤，請稍後再試');
      }
    }

    // 顯示主面板
    function showMainPanel() {
      document.getElementById('loginCard').classList.remove('active');
      document.getElementById('mainPanel').style.display = 'block';
      loadBans();
      loadStats();
    }

    // 切換 Tab
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.card[id$="Card"]').forEach(c => c.classList.remove('active'));

      if (tab === 'bans') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('bansCard').classList.add('active');
        loadBans();
      } else if (tab === 'rooms') {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('roomsCard').classList.add('active');
        loadRooms();
      } else {
        document.querySelector('.tab:nth-child(3)').classList.add('active');
        document.getElementById('statsCard').classList.add('active');
        loadStats();
      }
    }

    // 封鎖類型切換
    document.getElementById('banType').addEventListener('change', (e) => {
      document.getElementById('banDurationGroup').style.display = e.target.value === 'temporary' ? '' : 'none';
    });

    // ===== IP 封鎖 =====
    async function addBan() {
      const ip = document.getElementById('banIp').value.trim();
      const type = document.getElementById('banType').value;
      const reason = document.getElementById('banReason').value.trim();
      const duration = parseInt(document.getElementById('banDuration').value);

      if (!ip || !reason) {
        showMsg('bansError', '請輸入 IP 位址和原因');
        return;
      }

      try {
        const body = { ip, type, reason };
        if (type === 'temporary') body.duration = duration;

        const response = await fetch('/api/admin/bans', {
          method: 'POST',
          headers: getAdminHeaders(),
          body: JSON.stringify(body)
        });
        const data = await response.json();

        if (data.success) {
          showMsg('bansSuccess', '封鎖成功');
          document.getElementById('banIp').value = '';
          document.getElementById('banReason').value = '';
          loadBans();
          loadStats();
        } else {
          showMsg('bansError', data.error || '封鎖失敗');
        }
      } catch (error) {
        console.error('Add ban error:', error);
        showMsg('bansError', '網路錯誤');
      }
    }

    async function loadBans() {
      try {
        const response = await fetch('/api/admin/bans', { headers: getAdminHeaders() });
        const data = await response.json();
        const container = document.getElementById('bansList');

        if (data.bans && data.bans.length > 0) {
          container.innerHTML = data.bans.map(item => `
            <div class="list-item">
              <div class="item-info">
                <div class="item-trip"><code>${escapeHtml(item.ip)}</code></div>
                <div class="item-meta">
                  類型: ${item.type === 'permanent' ? '永久' : '暫時'}
                  ${item.reason ? ' | 原因: ' + escapeHtml(item.reason) : ''}
                  ${item.created_at ? ' | ' + new Date(item.created_at).toLocaleString('zh-TW') : ''}
                  ${item.expires_at ? ' | 到期: ' + new Date(item.expires_at).toLocaleString('zh-TW') : ''}
                </div>
              </div>
              <button class="danger" onclick="removeBan('${escapeHtml(item.ip)}')">解除封鎖</button>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="empty-state">📭 無封鎖記錄</div>';
        }
      } catch (error) {
        console.error('Load bans error:', error);
        document.getElementById('bansList').innerHTML = '<div class="error">載入失敗</div>';
      }
    }

    async function removeBan(ip) {
      if (!confirm('確定要解除 ' + ip + ' 的封鎖嗎？')) return;

      try {
        const response = await fetch('/api/admin/bans/' + encodeURIComponent(ip), {
          method: 'DELETE',
          headers: getAdminHeaders()
        });
        const data = await response.json();

        if (data.success) {
          showMsg('bansSuccess', '已解除封鎖');
          loadBans();
          loadStats();
        } else {
          showMsg('bansError', data.error || '解除失敗');
        }
      } catch (error) {
        console.error('Remove ban error:', error);
        showMsg('bansError', '網路錯誤');
      }
    }

    // ===== 房間管理 =====
    async function loadRooms() {
      try {
        const response = await fetch('/api/admin/rooms', { headers: getAdminHeaders() });
        const data = await response.json();
        const container = document.getElementById('roomsList');

        if (data.rooms && data.rooms.length > 0) {
          container.innerHTML = data.rooms.map(room => `
            <div class="list-item">
              <div class="item-info">
                <div class="item-trip">${escapeHtml(room.roomName || '未命名')} <small>#${room.roomNo}</small></div>
                <div class="item-meta">
                  狀態: ${room.status || 'unknown'}
                  | 玩家: ${room.playerCount || 0}/${room.maxUser || '-'}
                  ${room.comment ? ' | ' + escapeHtml(room.comment) : ''}
                </div>
              </div>
              <button class="danger" onclick="deleteRoom(${room.roomNo})">刪除</button>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="empty-state">📭 無房間</div>';
        }
      } catch (error) {
        console.error('Load rooms error:', error);
        document.getElementById('roomsList').innerHTML = '<div class="error">載入失敗</div>';
      }
    }

    async function deleteRoom(roomNo) {
      if (!confirm('確定要刪除房間 #' + roomNo + ' 嗎？')) return;

      try {
        const response = await fetch('/api/admin/rooms/' + roomNo, {
          method: 'DELETE',
          headers: getAdminHeaders()
        });
        const data = await response.json();

        if (data.success) {
          showMsg('roomsSuccess', '房間已刪除');
          loadRooms();
        } else {
          showMsg('roomsError', data.error || '刪除失敗');
        }
      } catch (error) {
        console.error('Delete room error:', error);
        showMsg('roomsError', '網路錯誤');
      }
    }

    // ===== 統計資料 =====
    async function loadStats() {
      try {
        const response = await fetch('/api/admin/stats', { headers: getAdminHeaders() });
        const data = await response.json();

        if (data.stats) {
          const s = data.stats;
          document.getElementById('statTotalRooms').textContent = s.totalRooms || 0;
          document.getElementById('statActiveRooms').textContent = s.activeRooms || 0;
          document.getElementById('statTotalPlayers').textContent = s.totalPlayers || 0;
          document.getElementById('statActivePlayers').textContent = s.activePlayers || 0;
          document.getElementById('statTotalGames').textContent = s.totalGames || 0;
          document.getElementById('statTotalBans').textContent = s.totalBans || 0;
        }
      } catch (error) {
        console.error('Load stats error:', error);
      }
    }

    // ===== 訊息顯示 =====
    function showMsg(elementId, message) {
      const el = document.getElementById(elementId);
      if (el) {
        el.textContent = message;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 5000);
      }
    }

    function showLoginError(message) {
      showMsg('loginError', message);
    }

    // HTML 轉義
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Enter 鍵登入
    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
    document.getElementById('adminUsername').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    // 自動登入（如果已有 session）
    if (isAdmin) {
      showMainPanel();
    }
  </script>
</body>
</html>
