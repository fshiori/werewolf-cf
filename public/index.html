<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人狼遊戲 - Werewolf CF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .room-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: #f0f0f0;
      color: #333;
    }

    button.secondary:hover {
      background: #e0e0e0;
    }

    .divider {
      text-align: center;
      margin: 30px 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      background: white;
      padding: 0 20px;
      position: relative;
      color: #999;
      font-size: 14px;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .rooms-list {
      margin-top: 30px;
    }

    .room-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .room-item:hover {
      background: #f0f0f0;
      transform: translateX(5px);
    }

    .room-name {
      font-weight: 600;
      color: #333;
    }

    .room-info {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    /* 角色配置面板 */
    .role-config {
      margin-top: 15px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      max-height: 400px;
      overflow-y: auto;
    }

    .role-config-title {
      font-weight: 600;
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .role-total {
      font-size: 13px;
      color: #999;
    }

    .role-team-header {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 12px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e0e0e0;
    }

    .role-team-header:first-of-type {
      margin-top: 0;
    }

    .role-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .role-row:last-child {
      border-bottom: none;
    }

    .role-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .role-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .role-name {
      font-size: 13px;
      color: #333;
      font-weight: 500;
    }

    .role-desc {
      font-size: 11px;
      color: #999;
      margin-left: auto;
      margin-right: 10px;
      white-space: nowrap;
    }



    .nav-links {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid #f0f0f0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #f9f9f9;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      transition: all 0.3s;
      font-size: 14px;
    }

    .nav-link:hover {
      background: #f0f0f0;
      transform: translateX(5px);
    }

    .nav-link .icon {
      font-size: 20px;
      margin-right: 10px;
    }

    .nav-link .text {
      flex: 1;
    }

    .nav-link .text strong {
      display: block;
      color: #333;
      margin-bottom: 2px;
    }

    .nav-link .text span {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐺 人狼遊戲</h1>
    <p class="subtitle">Werewolf CF - Cloudflare Workers</p>

    <div id="error" class="error"></div>

    <div id="createRoomForm">
      <div class="form-group">
        <label for="roomName">房間名稱</label>
        <input type="text" id="roomName" placeholder="例如：今晚來玩人狼" maxlength="32">
      </div>

      <div class="form-group">
        <label for="roomComment">房間說明（選填）</label>
        <input type="text" id="roomComment" placeholder="例如：新手歡迎" maxlength="100">
      </div>

      <div class="room-inputs">
        <div class="form-group">
          <label for="maxUser">最大人數</label>
          <input type="number" id="maxUser" value="16" min="2" max="32">
        </div>
        <div class="form-group">
          <label for="iconNo">頭像編號</label>
          <input type="number" id="iconNo" value="1" min="0" max="10">
        </div>
      </div>

      <div class="form-group">
        <label for="roomPassword">房間密碼（選填）</label>
        <input type="password" id="roomPassword" placeholder="留空為公開房間">
      </div>

      <details style="margin-bottom: 20px;">
        <summary style="cursor: pointer; color: #667eea; font-weight: 600; padding: 10px 0;">
          ⚙️ 進階設定
        </summary>
        <div style="margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
          <div class="room-inputs">
            <div class="form-group">
              <label for="timeLimit">投票時間限制（秒）</label>
              <input type="number" id="timeLimit" value="300" min="60" max="1800">
            </div>
            <div class="form-group">
              <label for="silenceMode">
                <input type="checkbox" id="silenceMode" checked style="width: auto; margin-right: 8px;">
                啟用沈默模式
              </label>
            </div>
          </div>
          <div class="room-inputs">
            <div class="form-group">
              <label for="allowSpectators">
                <input type="checkbox" id="allowSpectators" checked style="width: auto; margin-right: 8px;">
                允許觀戰
              </label>
            </div>
            <div class="form-group">
              <label for="maxSpectators">最大觀戰人數</label>
              <input type="number" id="maxSpectators" value="10" min="0" max="50">
            </div>
          </div>

          <!-- 角色追加與調整（依原版 DIAM 邏輯） -->
          <div class="role-config" id="roleConfig">
            <div class="role-config-title">
              <span>🎭 角色追加與調整</span>
              <span class="role-hint" id="roleHint">基本角色依人數自動分配</span>
            </div>

            <!-- 角色預覽（即時顯示） -->
            <div id="rolePreview" class="role-preview" style="margin-bottom:12px;padding:8px;background:#eee;border-radius:6px;font-size:12px;color:#555;">
              載入中...
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optDummyBoy" style="width:auto;margin:0;">
                <span><strong>替身君</strong> <small style="color:#999;">第一天晚上狼只能咬替身君</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optWishRole" style="width:auto;margin:0;">
                <span><strong>希望角色</strong> <small style="color:#999;">打勾後玩家可選擇希望角色</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optOpenVote" style="width:auto;margin:0;">
                <span><strong>公開投票</strong> <small style="color:#999;">顯示投票結果票數</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optDellook" style="width:auto;margin:0;">
                <span><strong>幽靈看角色</strong> <small style="color:#999;">允許幽靈觀看存活者角色</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optWill" checked style="width:auto;margin:0;">
                <span><strong>啟用遺書</strong> <small style="color:#999;">允許玩家保留遺書</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optVoteMe" style="width:auto;margin:0;">
                <span><strong>白天自投</strong> <small style="color:#999;">允許白天投票給自己</small></span>
              </label>
            </div>

            <div class="role-team-header">⚡ 額外職業（依人數自動啟用/停用）</div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optLovers" style="width:auto;margin:0;">
                <span><strong>💕 戀人</strong> <small style="color:#999;">（13人以上可選）打勾後共有者變戀人，可兼任</small></span>
              </label>
            </div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optDecide" style="width:auto;margin:0;">
                <span><strong>⚖️ 決定者</strong> <small style="color:#999;">（16人以上可選）票數相同時決定者票優先，可兼任</small></span>
              </label>
            </div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optAuthority" style="width:auto;margin:0;">
                <span><strong>👑 權力者</strong> <small style="color:#999;">（16人以上可選）投票票數為2票，可兼任</small></span>
              </label>
            </div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optWfbig" style="width:auto;margin:0;">
                <span><strong>👹 大狼</strong> <small style="color:#999;">（20人以上可選）狼群隨機一隻取代為大狼</small></span>
              </label>
            </div>

            <div class="role-option-row" style="display:flex;align-items:center;gap:8px;padding:4px 0;">
              <label style="white-space:nowrap;"><strong>☠️ 埋毒者</strong> <small style="color:#999;">（20人以上）</small></label>
              <select id="optPoison" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
                <option value="">無</option>
                <option value="poison">埋毒</option>
                <option value="cat">貓又</option>
              </select>
            </div>

            <div class="role-option-row" style="display:flex;align-items:center;gap:8px;padding:4px 0;margin-bottom:8px;">
              <label style="white-space:nowrap;"><strong>🦊 妖狐</strong> <small style="color:#999;">（20人以上）使用將取消埋毒</small></label>
              <select id="optFoxs" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
                <option value="">無</option>
                <option value="betr">背德</option>
                <option value="foxs">雙狐</option>
                <option value="fosi">子狐</option>
              </select>
            </div>
        </div>
      </details>

      <button onclick="createRoom()">建立房間</button>
    </div>

    <div class="divider">
      <span>或</span>
    </div>

    <div id="joinRoomForm">
      <div class="form-group">
        <label for="joinRoomNo">房間編號</label>
        <input type="text" id="joinRoomNo" placeholder="輸入房間編號">
      </div>

      <div class="form-group">
        <label for="joinPassword">房間密碼（如需）</label>
        <input type="password" id="joinPassword" placeholder="私人房間需要密碼">
      </div>

      <div class="form-group">
        <label for="username">使用者名稱</label>
        <input type="text" id="username" placeholder="例如：Eric" maxlength="20">
      </div>

      <div class="form-group">
        <label for="displayName">顯示名稱</label>
        <input type="text" id="displayName" placeholder="例如：玩家1" maxlength="32">
      </div>

      <div class="form-group">
        <label for="tripcodePassword">Tripcode 密碼（選填）</label>
        <input type="password" id="tripcodePassword" placeholder="用於驗證身份">
      </div>

      <button onclick="joinRoom()">加入房間</button>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p style="margin-top: 10px; color: #999;">載入中...</p>
    </div>

    <div class="nav-links">
      <a href="/logs.html" class="nav-link">
        <span class="icon">📜</span>
        <span class="text">
          <strong>遊戲記錄</strong>
          <span>查看所有遊戲歷史</span>
        </span>
      </a>

      <a href="/stats.html" class="nav-link">
        <span class="icon">📊</span>
        <span class="text">
          <strong>個人統計</strong>
          <span>查詢玩家資料</span>
        </span>
      </a>

      <a href="/votes.html" class="nav-link">
        <span class="icon">🗳️</span>
        <span class="text">
          <strong>投票統計</strong>
          <span>查看投票記錄</span>
        </span>
      </a>

      <a href="/rule.html" class="nav-link">
        <span class="icon">📖</span>
        <span class="text">
          <strong>遊戲規則</strong>
          <span>新手必讀</span>
        </span>
      </a>

      <a href="/settings.html" class="nav-link">
        <span class="icon">⚙️</span>
        <span class="text">
          <strong>玩家設定</strong>
          <span>NG 用戶管理</span>
        </span>
      </a>

      <a href="/bbs.html" class="nav-link">
        <span class="icon">💬</span>
        <span class="text">
          <strong>討論板</strong>
          <span>BBS 交流區</span>
        </span>
      </a>

      <a href="/replay.html" class="nav-link">
        <span class="icon">🎬</span>
        <span class="text">
          <strong>戰局回放</strong>
          <span>觀看歷史對局</span>
        </span>
      </a>

      <a href="/achievements.html" class="nav-link">
        <span class="icon">🏆</span>
        <span class="text">
          <strong>成就</strong>
          <span>解鎖成就列表</span>
        </span>
      </a>

      <a href="/manage.html" class="nav-link">
        <span class="icon">🛡️</span>
        <span class="text">
          <strong>管理面板</strong>
          <span>黑白名單</span>
        </span>
      </a>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // ===== 角色系統（依原版 DIAM 邏輯） =====

    // 原版角色分配表：根據人數自動分配基本角色
    const ROLE_TABLE = {
      8:  ['human','human','human','human','human','wolf','wolf','mage'],
      9:  ['human','human','human','human','human','wolf','wolf','mage','necromancer'],
      10: ['human','human','human','human','human','wolf','wolf','mage','necromancer','mad'],
      11: ['human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard'],
      12: ['human','human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard'],
      13: ['human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard','common','common'],
      14: ['human','human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard','common','common'],
      15: ['human','human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      16: ['human','human','human','human','human','human','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      17: ['human','human','human','human','human','human','human','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      18: ['human','human','human','human','human','human','human','human','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      19: ['human','human','human','human','human','human','human','human','human','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      20: ['human','human','human','human','human','human','human','human','human','human','fox','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common'],
      22: ['human','human','human','human','human','human','human','human','human','human','human','human','fox','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common'],
      30: ['human','human','human','human','human','human','human','human','human','human','human','human','fox','wolf','wolf','wolf','wolf','wolf','wolf','mage','mage','necromancer','necromancer','mad','guard','guard','common','common','common'],
    };

    // 角色中文名稱對照
    const ROLE_NAMES = {
      human: '村民', wolf: '人狼', mage: '占卜師', necromancer: '靈能者',
      mad: '狂人', guard: '獵人', common: '共有者', fox: '妖狐',
      betr: '背德', fosi: '子狐', poison: '埋毒者', cat: '貓又',
      wfbig: '大狼', decide: '決定者', authority: '權力者', lovers: '戀人'
    };

    function getRoleTable(count) {
      // 找最接近的人數配置
      const keys = Object.keys(ROLE_TABLE).map(Number).sort((a,b) => a-b);
      for (const k of keys) {
        if (count <= k) return ROLE_TABLE[k];
      }
      return ROLE_TABLE[30]; // 最多
    }

    function countRoles(roles) {
      const counts = {};
      for (const r of roles) {
        counts[r] = (counts[r] || 0) + 1;
      }
      return counts;
    }

    function updateRolePreview() {
      const maxUser = parseInt(document.getElementById('maxUser').value) || 16;
      const baseRoles = getRoleTable(maxUser);
      const counts = countRoles(baseRoles);

      // 處理妖狐選項（會替換表中的 fox 或取消）
      const foxsVal = document.getElementById('optFoxs').value;
      const poisonVal = document.getElementById('optPoison').value;

      // 顯示基本角色
      let parts = [];
      parts.push(`村民×${counts['human'] || 0}`);
      parts.push(`人狼×${counts['wolf'] || 0}`);
      if (counts['mage']) parts.push(`占卜師×${counts['mage']}`);
      if (counts['necromancer']) parts.push(`靈能者×${counts['necromancer']}`);
      if (counts['mad']) parts.push(`狂人×${counts['mad']}`);
      if (counts['guard']) parts.push(`獵人×${counts['guard']}`);
      if (counts['common']) parts.push(`共有者×${counts['common']}`);
      if (counts['fox']) parts.push(`妖狐×${counts['fox']}`);

      document.getElementById('rolePreview').innerHTML =
        `<strong>${maxUser}人配置：</strong> ${parts.join('　')}`;

      // 啟用/停用 checkbox（依人數）
      toggleOpt('optLovers', maxUser >= 13, '需13人以上');
      toggleOpt('optDecide', maxUser >= 16, '需16人以上');
      toggleOpt('optAuthority', maxUser >= 16, '需16人以上');
      toggleOpt('optWfbig', maxUser >= 20, '需20人以上');
      toggleOpt('optPoison', maxUser >= 20, '需20人以上');
      toggleOpt('optFoxs', maxUser >= 20, '需20人以上');

      // 妖狐與埋毒互斥
      if (foxsVal) {
        document.getElementById('optPoison').disabled = true;
        document.getElementById('optPoison').value = '';
      } else {
        document.getElementById('optPoison').disabled = false;
      }
    }

    function toggleOpt(id, enabled, reason) {
      const el = document.getElementById(id);
      if (enabled) {
        el.disabled = false;
        el.closest('label')?.querySelector('small')?.style && (el.closest('label').querySelector('small').style.color = '#999');
      } else {
        el.disabled = true;
        el.checked = false;
        el.value = (el.tagName === 'SELECT') ? '' : false;
        const label = el.closest('label') || el.closest('div');
        if (label) {
          const small = label.querySelector('small');
          if (small) small.style.color = '#ccc';
        }
      }
    }

    // 取得選項字串（傳給後端）
    function getOptionRole() {
      const parts = [];
      if (document.getElementById('optLovers').checked) parts.push('lovers');
      if (document.getElementById('optDecide').checked) parts.push('decide');
      if (document.getElementById('optAuthority').checked) parts.push('authority');
      if (document.getElementById('optWfbig').checked) parts.push('wfbig');
      const poison = document.getElementById('optPoison').value;
      if (poison) parts.push(poison);
      const foxs = document.getElementById('optFoxs').value;
      if (foxs) parts.push(foxs);
      return parts.join(' ');
    }

    function getGameOptions() {
      return {
        timeLimit: parseInt(document.getElementById('timeLimit').value),
        silenceMode: document.getElementById('silenceMode').checked,
        allowSpectators: document.getElementById('allowSpectators').checked,
        maxSpectators: parseInt(document.getElementById('maxSpectators').value),
        dummyBoy: document.getElementById('optDummyBoy').checked,
        wishRole: document.getElementById('optWishRole').checked,
        openVote: document.getElementById('optOpenVote').checked,
        dellook: document.getElementById('optDellook').checked,
        will: document.getElementById('optWill').checked,
        voteMe: document.getElementById('optVoteMe').checked,
      };
    }

    // 監聽人數變化
    document.getElementById('maxUser').addEventListener('change', updateRolePreview);

    // 頁面載入
    window.addEventListener('load', () => {
      updateRolePreview();
    });

    // ===== 主功能 =====

    function showError(message) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('show', show);
    }

    async function createRoom() {
      const roomName = document.getElementById('roomName').value.trim();
      const roomComment = document.getElementById('roomComment').value.trim();
      const maxUser = parseInt(document.getElementById('maxUser').value);
      const iconNo = parseInt(document.getElementById('iconNo').value);
      const roomPassword = document.getElementById('roomPassword').value.trim();
      const timeLimit = parseInt(document.getElementById('timeLimit').value);
      const optionRole = getOptionRole();
      const gameOpts = getGameOptions();

      if (!roomName) {
        showError('請輸入房間名稱');
        return;
      }

      showLoading(true);

      try {
        const response = await fetch(`${API_BASE}/api/rooms`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            roomName,
            roomComment,
            maxUser,
            gameOption: JSON.stringify(gameOpts),
            optionRole,
            password: roomPassword || undefined
          })
        });

        const data = await response.json();

        if (data.success) {
          // 房間建立成功，儲存房主密碼（如果有）
          if (roomPassword) {
            sessionStorage.setItem(`room_password_${data.roomNo}`, roomPassword);
          }
          // 跳轉到遊戲頁面
          window.location.href = `/game.html?roomNo=${data.roomNo}&iconNo=${iconNo}&isHost=true`;
        } else {
          showError(data.error || '建立房間失敗');
        }
      } catch (error) {
        console.error('Create room error:', error);
        showError('網路錯誤，請稍後再試');
      } finally {
        showLoading(false);
      }
    }

    async function joinRoom() {
      const roomNo = document.getElementById('joinRoomNo').value.trim();
      const joinPassword = document.getElementById('joinPassword').value.trim();
      const username = document.getElementById('username').value.trim();
      const displayName = document.getElementById('displayName').value.trim();
      const tripcodePassword = document.getElementById('tripcodePassword').value;

      if (!roomNo || !username || !displayName) {
        showError('請填寫所有必填欄位');
        return;
      }

      showLoading(true);

      try {
        // 先檢查房間是否存在並驗證密碼
        const roomResponse = await fetch(`${API_BASE}/api/rooms/${roomNo}`);
        if (!roomResponse.ok) {
          showError('房間不存在');
          showLoading(false);
          return;
        }

        const roomData = await roomResponse.json();

        // 檢查是否為私人房間
        if (roomData.is_private && roomData.password !== joinPassword) {
          showError('房間密碼錯誤');
          showLoading(false);
          return;
        }

        // 生成 tripcode（如果有密碼）
        let trip = '';
        if (tripcodePassword) {
          const tripResponse = await fetch(`${API_BASE}/api/trip`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: tripcodePassword })
          });
          const tripData = await tripResponse.json();
          trip = tripData.trip || '';
        }

        // 加入房間
        const response = await fetch(`${API_BASE}/api/rooms/${roomNo}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            uname: username,
            handleName: displayName,
            trip,
            iconNo: 1,
            sex: 'male',
            password: joinPassword
          })
        });

        const data = await response.json();

        if (data.success) {
          // 加入成功，儲存 session 和密碼
          localStorage.setItem(`session_${roomNo}`, data.sessionId);
          if (joinPassword) {
            sessionStorage.setItem(`room_password_${roomNo}`, joinPassword);
          }
          window.location.href = `/game.html?roomNo=${roomNo}`;
        } else {
          showError(data.error || '加入房間失敗');
        }
      } catch (error) {
        console.error('Join room error:', error);
        showError('網路錯誤，請稍後再試');
      } finally {
        showLoading(false);
      }
    }

    // 頁面載入時檢查 URL 參數
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const roomNo = params.get('roomNo');

      if (roomNo) {
        // 預填房間編號
        document.getElementById('joinRoomNo').value = roomNo;
      }
    });
  </script>
</body>
</html>
