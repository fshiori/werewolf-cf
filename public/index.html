<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-page-title="index.title">人狼遊戲 - Werewolf CF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .room-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: #f0f0f0;
      color: #333;
    }

    button.secondary:hover {
      background: #e0e0e0;
    }

    .divider {
      text-align: center;
      margin: 30px 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      background: white;
      padding: 0 20px;
      position: relative;
      color: #999;
      font-size: 14px;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .rooms-list {
      margin-top: 30px;
    }

    .room-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .room-item:hover {
      background: #f0f0f0;
      transform: translateX(5px);
    }

    .room-name {
      font-weight: 600;
      color: #333;
    }

    .room-info {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    /* 角色配置面板 */
    .role-config {
      margin-top: 15px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      max-height: 400px;
      overflow-y: auto;
    }

    .role-config-title {
      font-weight: 600;
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .role-total {
      font-size: 13px;
      color: #999;
    }

    .role-team-header {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 12px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e0e0e0;
    }

    .role-team-header:first-of-type {
      margin-top: 0;
    }

    .role-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .role-row:last-child {
      border-bottom: none;
    }

    .role-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .role-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .role-name {
      font-size: 13px;
      color: #333;
      font-weight: 500;
    }

    .role-desc {
      font-size: 11px;
      color: #999;
      margin-left: auto;
      margin-right: 10px;
      white-space: nowrap;
    }



    .nav-links {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid #f0f0f0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #f9f9f9;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      transition: all 0.3s;
      font-size: 14px;
    }

    .nav-link:hover {
      background: #f0f0f0;
      transform: translateX(5px);
    }

    .nav-link .icon {
      font-size: 20px;
      margin-right: 10px;
    }

    .nav-link .text {
      flex: 1;
    }

    .nav-link .text strong {
      display: block;
      color: #333;
      margin-bottom: 2px;
    }

    .nav-link .text span {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 data-i18n="index.heading">🐺 人狼遊戲</h1>
    <p class="subtitle" data-i18n="common.subtitle">Werewolf CF - Cloudflare Workers</p>

    <div id="error" class="error"></div>

    <div id="createRoomForm">
      <div class="form-group">
        <label for="roomName" data-i18n="index.label.room_name">房間名稱</label>
        <input type="text" id="roomName" data-i18n-placeholder="index.placeholder.room_name" placeholder="例如：今晚來玩人狼" maxlength="32">
      </div>

      <div class="form-group">
        <label for="roomComment" data-i18n="index.label.room_comment">房間說明（選填）</label>
        <input type="text" id="roomComment" data-i18n-placeholder="index.placeholder.room_comment" placeholder="例如：新手歡迎" maxlength="100">
      </div>

      <div class="room-inputs">
        <div class="form-group">
          <label for="maxUser" data-i18n="index.label.max_users">最大人數</label>
          <input type="number" id="maxUser" value="16" min="2" max="32">
        </div>
        <div class="form-group">
          <label for="iconNo" data-i18n="index.label.icon_no">頭像編號</label>
          <input type="number" id="iconNo" value="1" min="0" max="10">
        </div>
      </div>

      <div class="form-group">
        <label for="roomPassword" data-i18n="index.label.room_password">房間密碼（選填）</label>
        <input type="password" id="roomPassword" data-i18n-placeholder="index.placeholder.room_password" placeholder="留空為公開房間">
      </div>

      <details style="margin-bottom: 20px;">
        <summary style="cursor: pointer; color: #667eea; font-weight: 600; padding: 10px 0;">
          ⚙️ 進階設定
        </summary>
        <div style="margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
          <div class="room-inputs">
            <div class="form-group">
              <label for="timeLimit">投票時間限制（秒）</label>
              <input type="number" id="timeLimit" value="300" min="60" max="1800">
            </div>
            <div class="form-group">
              <label for="silenceMode">
                <input type="checkbox" id="silenceMode" checked style="width: auto; margin-right: 8px;">
                啟用沈默模式
              </label>
            </div>
          </div>
          <div class="room-inputs">
            <div class="form-group">
              <label for="allowSpectators">
                <input type="checkbox" id="allowSpectators" checked style="width: auto; margin-right: 8px;">
                允許觀戰
              </label>
            </div>
            <div class="form-group">
              <label for="maxSpectators">最大觀戰人數</label>
              <input type="number" id="maxSpectators" value="10" min="0" max="50">
            </div>
          </div>

          <!-- 角色追加與調整（依原版 DIAM 邏輯） -->
          <div class="role-config" id="roleConfig">
            <div class="role-config-title">
              <span>🎭 角色追加與調整</span>
              <span class="role-hint" id="roleHint">基本角色依人數自動分配</span>
            </div>

            <!-- 角色預覽（即時顯示） -->
            <div id="rolePreview" class="role-preview" style="margin-bottom:12px;padding:8px;background:#eee;border-radius:6px;font-size:12px;color:#555;">
              載入中...
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optDummyBoy" style="width:auto;margin:0;">
                <span><strong>替身君</strong> <small style="color:#999;">第一天晚上狼只能咬替身君</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optWishRole" style="width:auto;margin:0;">
                <span><strong>希望角色</strong> <small style="color:#999;">打勾後玩家可選擇希望角色</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optOpenVote" style="width:auto;margin:0;">
                <span><strong>公開投票</strong> <small style="color:#999;">顯示投票結果票數</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optDellook" style="width:auto;margin:0;">
                <span><strong>幽靈看角色</strong> <small style="color:#999;">允許幽靈觀看存活者角色</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optWill" checked style="width:auto;margin:0;">
                <span><strong>啟用遺書</strong> <small style="color:#999;">允許玩家保留遺書</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optVoteMe" style="width:auto;margin:0;">
                <span><strong>白天自投</strong> <small style="color:#999;">允許白天投票給自己</small></span>
              </label>
            </div>

            <div class="role-team-header">🎮 遊戲管理</div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optGmEnabled" style="width:auto;margin:0;">
                <span><strong>GM（遊戲管理員）</strong> <small style="color:#999;">啟用後房長成為 GM，可殺害/復活/轉職/標記玩家、廣播訊息</small></span>
              </label>
            </div>

            <div id="gmTripRow" style="margin-bottom:10px;display:none;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="text" id="optGmTrip" placeholder="指定 Trip 帳號擔任 GM" style="width:100%;margin:0;">
                <span><strong>GM Trip</strong> <small style="color:#999;">指定哪個 Trip 擔任 GM</small></span>
              </label>
            </div>

            <div class="role-team-header">🔧 進階選項</div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optTripRequired" style="width:auto;margin:0;">
                <span><strong>Trip 驗證</strong> <small style="color:#999;">玩家需擁有 Trip 才能加入房間</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optRealTime" style="width:auto;margin:0;">
                <span><strong>即時制</strong> <small style="color:#999;">白天/夜晚使用獨立計時器（不依賴投票結束）</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optComoutl" style="width:auto;margin:0;">
                <span><strong>連續淘汰</strong> <small style="color:#999;">被淘汰玩家的連續同陣營者也一併淘汰</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <span><strong>投票顯示</strong></span>
                <select id="optVoteDisplay" style="width:auto;margin:0;padding:2px 6px;">
                  <option value="0">隱藏全部</option>
                  <option value="1">顯示全部</option>
                  <option value="2">匿名顯示</option>
                </select>
                <small style="color:#999;">投票結果的顯示方式</small>
              </label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0 0 0;">
                <input type="checkbox" id="optVotedisplay" style="width:auto;margin:0;">
                <span><strong>顯示投票進度</strong> <small style="color:#999;">公開誰已完成投票（不公開投給誰）</small></span>
              </label>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optCustDummy" style="width:auto;margin:0;">
                <span><strong>自訂替身</strong> <small style="color:#999;">啟用自訂替身君名稱/遺言</small></span>
              </label>
            </div>

            <div id="custDummyRow" style="margin-bottom:10px;display:none;padding:10px;border:1px dashed #d0d0d0;border-radius:8px;background:#fafafa;">
              <div style="display:flex;flex-direction:column;gap:8px;">
                <label style="display:flex;flex-direction:column;gap:4px;">
                  <span><strong>替身君名稱</strong> <small style="color:#999;">預設：替身君</small></span>
                  <input type="text" id="optDummyCustomName" maxlength="32" placeholder="例如：村口的稻草人" style="margin:0;">
                </label>
                <label style="display:flex;flex-direction:column;gap:4px;">
                  <span><strong>替身君遺言</strong> <small style="color:#999;">可留空，最多 120 字</small></span>
                  <textarea id="optDummyCustomLastWords" maxlength="120" rows="2" placeholder="例如：我只是個替身..." style="margin:0;resize:vertical;"></textarea>
                </label>
              </div>
            </div>

            <div style="margin-bottom:10px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optIstrip" style="width:auto;margin:0;">
                <span><strong>旅行模式</strong> <small style="color:#999;">啟用 Trip 旅行者系統</small></span>
              </label>
            </div>

            <div class="role-team-header">⚡ 額外職業（依人數自動啟用/停用）</div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optLovers" style="width:auto;margin:0;">
                <span><strong>💕 戀人</strong> <small style="color:#999;">（13人以上可選）打勾後共有者變戀人，可兼任</small></span>
              </label>
            </div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optDecide" style="width:auto;margin:0;">
                <span><strong>⚖️ 決定者</strong> <small style="color:#999;">（16人以上可選）票數相同時決定者票優先，可兼任</small></span>
              </label>
            </div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optAuthority" style="width:auto;margin:0;">
                <span><strong>👑 權力者</strong> <small style="color:#999;">（16人以上可選）投票票數為2票，可兼任</small></span>
              </label>
            </div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optWfbig" style="width:auto;margin:0;">
                <span><strong>👹 大狼</strong> <small style="color:#999;">（20人以上可選）狼群隨機一隻取代為大狼</small></span>
              </label>
            </div>

            <div class="role-option-row" style="display:flex;align-items:center;gap:8px;padding:4px 0;">
              <label style="white-space:nowrap;"><strong>☠️ 埋毒者</strong> <small style="color:#999;">（20人以上）</small></label>
              <select id="optPoison" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
                <option value="">無</option>
                <option value="poison">埋毒</option>
                <option value="cat">貓又</option>
              </select>
            </div>

            <div class="role-option-row" style="display:flex;align-items:center;gap:8px;padding:4px 0;margin-bottom:8px;">
              <label style="white-space:nowrap;"><strong>🦊 妖狐</strong> <small style="color:#999;">（20人以上）使用將取消埋毒（勾選 pobe 例外）</small></label>
              <select id="optFoxs" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
                <option value="">無</option>
                <option value="betr">背德</option>
                <option value="foxs">雙狐</option>
                <option value="fosi">子狐</option>
              </select>
            </div>

            <div style="margin-bottom:8px;">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;">
                <input type="checkbox" id="optPobe" style="width:auto;margin:0;">
                <span><strong>☣️ pobe</strong> <small style="color:#999;">（20人以上）強制加入埋毒（與妖狐並存時追加狼+埋毒）</small></span>
              </label>
            </div>
        </div>
      </details>

      <button onclick="createRoom()" data-i18n="index.create_room">建立房間</button>
    </div>

    <div class="divider">
      <span data-i18n="index.or">或</span>
    </div>

    <div id="joinRoomForm">
      <div class="form-group">
        <label for="joinRoomNo" data-i18n="index.label.join_room_no">房間編號</label>
        <input type="text" id="joinRoomNo" data-i18n-placeholder="index.placeholder.join_room_no" placeholder="輸入房間編號">
      </div>

      <div class="form-group">
        <label for="joinPassword" data-i18n="index.label.join_password">房間密碼（如需）</label>
        <input type="password" id="joinPassword" data-i18n-placeholder="index.placeholder.join_password" placeholder="私人房間需要密碼">
      </div>

      <div class="form-group">
        <label for="username" data-i18n="index.label.username">使用者名稱</label>
        <input type="text" id="username" data-i18n-placeholder="index.placeholder.username" placeholder="例如：Eric" maxlength="20">
      </div>

      <div class="form-group">
        <label for="displayName" data-i18n="index.label.display_name">顯示名稱</label>
        <input type="text" id="displayName" data-i18n-placeholder="index.placeholder.display_name" placeholder="例如：玩家1" maxlength="32">
      </div>

      <div class="form-group">
        <label for="tripcodePassword" data-i18n="index.label.tripcode">Tripcode 密碼（選填）</label>
        <input type="password" id="tripcodePassword" data-i18n-placeholder="index.placeholder.tripcode" placeholder="用於驗證身份">
      </div>

      <div class="form-group">
        <label for="wishRole">希望角色（僅 wishRole 房規啟用時生效）</label>
        <select id="wishRole">
          <option value="none">不指定</option>
          <option value="human">村民</option>
          <option value="wolf">人狼</option>
          <option value="mage">占卜師</option>
          <option value="necromancer">靈能者</option>
          <option value="mad">狂人</option>
          <option value="guard">獵人</option>
          <option value="common">共有者</option>
          <option value="fox">妖狐</option>
        </select>
      </div>

      <button onclick="joinRoom()" data-i18n="index.join_room">加入房間</button>
    </div>

    <div id="loading" class="loading">

    <!-- 房間列表 -->
    <div id="roomList" style="margin-top:20px;">
      <h3 style="color:#555;font-size:14px;margin-bottom:10px;" data-i18n="index.existing_rooms">📋 現有房間</h3>
      <div id="roomListContent" style="text-align:center;color:#999;font-size:13px;">載入中...</div>
    </div>

    <!-- Language Switcher -->
    <div style="margin-top:20px; text-align:center;">
      <label for="locale-select" style="font-size:13px; color:#666; margin-right:8px;" data-i18n="locale.select">語言</label>
      <select id="locale-select" onchange="I18n.setLocale(this.value)" style="padding:6px 12px; border:1px solid #ddd; border-radius:6px; font-size:13px; cursor:pointer;">
        <option value="zh-TW">繁體中文</option>
        <option value="ja">日本語</option>

  <script src="/i18n.js"></script>
  <script>
    // Initialize i18n, then run app logic
    I18n.init().then(() => {
      // Sync locale-select dropdown with current locale
      const sel = document.getElementById('locale-select');
      if (sel) sel.value = I18n.getLocale();
    });

    const API_BASE = window.location.origin;

    // ===== 角色系統（依原版 DIAM 邏輯） =====

    // 原版角色分配表：根據人數自動分配基本角色
    const ROLE_TABLE = {
      8:  ['human','human','human','human','human','wolf','wolf','mage'],
      9:  ['human','human','human','human','human','wolf','wolf','mage','necromancer'],
      10: ['human','human','human','human','human','wolf','wolf','mage','necromancer','mad'],
      11: ['human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard'],
      12: ['human','human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard'],
      13: ['human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard','common','common'],
      14: ['human','human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard','common','common'],
      15: ['human','human','human','human','human','human','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      16: ['human','human','human','human','human','human','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      17: ['human','human','human','human','human','human','human','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      18: ['human','human','human','human','human','human','human','human','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      19: ['human','human','human','human','human','human','human','human','human','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common','fox'],
      20: ['human','human','human','human','human','human','human','human','human','human','fox','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common'],
      22: ['human','human','human','human','human','human','human','human','human','human','human','human','fox','wolf','wolf','wolf','mage','necromancer','mad','guard','common','common'],
      30: ['human','human','human','human','human','human','human','human','human','human','human','human','fox','wolf','wolf','wolf','wolf','wolf','wolf','mage','mage','necromancer','necromancer','mad','guard','guard','common','common','common'],
    };

    // 角色中文名稱對照
    const ROLE_NAMES = {
      human: '村民', wolf: '人狼', mage: '占卜師', necromancer: '靈能者',
      mad: '狂人', guard: '獵人', common: '共有者', fox: '妖狐',
      betr: '背德', fosi: '子狐', poison: '埋毒者', cat: '貓又',
      wfbig: '大狼', decide: '決定者', authority: '權力者', lovers: '戀人'
    };

    function getRoleTable(count) {
      // 找最接近的人數配置
      const keys = Object.keys(ROLE_TABLE).map(Number).sort((a,b) => a-b);
      for (const k of keys) {
        if (count <= k) return ROLE_TABLE[k];
      }
      return ROLE_TABLE[30]; // 最多
    }

    function countRoles(roles) {
      const counts = {};
      for (const r of roles) {
        counts[r] = (counts[r] || 0) + 1;
      }
      return counts;
    }

    function updateRolePreview() {
      const maxUser = parseInt(document.getElementById('maxUser').value) || 16;
      const baseRoles = getRoleTable(maxUser);
      const counts = countRoles(baseRoles);

      // 處理妖狐選項（會替換表中的 fox 或取消）
      const foxsVal = document.getElementById('optFoxs').value;
      const poisonVal = document.getElementById('optPoison').value;

      // 顯示基本角色
      let parts = [];
      parts.push(`村民×${counts['human'] || 0}`);
      parts.push(`人狼×${counts['wolf'] || 0}`);
      if (counts['mage']) parts.push(`占卜師×${counts['mage']}`);
      if (counts['necromancer']) parts.push(`靈能者×${counts['necromancer']}`);
      if (counts['mad']) parts.push(`狂人×${counts['mad']}`);
      if (counts['guard']) parts.push(`獵人×${counts['guard']}`);
      if (counts['common']) parts.push(`共有者×${counts['common']}`);
      if (counts['fox']) parts.push(`妖狐×${counts['fox']}`);

      document.getElementById('rolePreview').innerHTML =
        `<strong>${maxUser}人配置：</strong> ${parts.join('　')}`;

      // 啟用/停用 checkbox（依人數）
      toggleOpt('optLovers', maxUser >= 13, '需13人以上');
      toggleOpt('optDecide', maxUser >= 16, '需16人以上');
      toggleOpt('optAuthority', maxUser >= 16, '需16人以上');
      toggleOpt('optWfbig', maxUser >= 20, '需20人以上');
      toggleOpt('optPoison', maxUser >= 20, '需20人以上');
      toggleOpt('optFoxs', maxUser >= 20, '需20人以上');
      toggleOpt('optPobe', maxUser >= 20, '需20人以上');

      // 妖狐與埋毒互斥（pobe 勾選時可共存）
      const pobeChecked = document.getElementById('optPobe').checked;
      if (foxsVal && !pobeChecked) {
        document.getElementById('optPoison').disabled = true;
        document.getElementById('optPoison').value = '';
      } else {
        document.getElementById('optPoison').disabled = maxUser < 20;
      }
    }

    function toggleOpt(id, enabled, reason) {
      const el = document.getElementById(id);
      if (enabled) {
        el.disabled = false;
        el.closest('label')?.querySelector('small')?.style && (el.closest('label').querySelector('small').style.color = '#999');
      } else {
        el.disabled = true;
        el.checked = false;
        el.value = (el.tagName === 'SELECT') ? '' : false;
        const label = el.closest('label') || el.closest('div');
        if (label) {
          const small = label.querySelector('small');
          if (small) small.style.color = '#ccc';
        }
      }
    }

    // 取得選項字串（傳給後端）
    function getOptionRole() {
      const parts = [];
      if (document.getElementById('optLovers').checked) parts.push('lovers');
      if (document.getElementById('optDecide').checked) parts.push('decide');
      if (document.getElementById('optAuthority').checked) parts.push('authority');
      if (document.getElementById('optWfbig').checked) parts.push('wfbig');
      const poison = document.getElementById('optPoison').value;
      if (poison) parts.push(poison);
      const foxs = document.getElementById('optFoxs').value;
      if (foxs) parts.push(foxs);
      if (document.getElementById('optPobe').checked) parts.push('pobe');
      return parts.join(' ');
    }

    function getGameOptions() {
      const custDummyEnabled = document.getElementById('optCustDummy').checked;
      const customDummyName = document.getElementById('optDummyCustomName').value.trim();
      const customDummyLastWords = document.getElementById('optDummyCustomLastWords').value.trim();

      return {
        timeLimit: parseInt(document.getElementById('timeLimit').value),
        silenceMode: document.getElementById('silenceMode').checked,
        allowSpectators: document.getElementById('allowSpectators').checked,
        maxSpectators: parseInt(document.getElementById('maxSpectators').value),
        dummyBoy: document.getElementById('optDummyBoy').checked,
        wishRole: document.getElementById('optWishRole').checked,
        openVote: document.getElementById('optOpenVote').checked,
        dellook: document.getElementById('optDellook').checked,
        will: document.getElementById('optWill').checked,
        voteMe: document.getElementById('optVoteMe').checked,
        gmEnabled: document.getElementById('optGmEnabled').checked,
        tripRequired: document.getElementById('optTripRequired').checked,
        gmTrip: document.getElementById('optGmTrip').value,
        realTime: document.getElementById('optRealTime').checked,
        comoutl: document.getElementById('optComoutl').checked,
        voteDisplay: parseInt(document.getElementById('optVoteDisplay').value),
        votedisplay: document.getElementById('optVotedisplay').checked,
        custDummy: custDummyEnabled,
        dummyCustomName: custDummyEnabled ? customDummyName : '',
        dummyCustomLastWords: custDummyEnabled ? customDummyLastWords : '',
        istrip: document.getElementById('optIstrip').checked,
      };
    }

    // 監聽人數/角色選項變化
    document.getElementById('maxUser').addEventListener('change', updateRolePreview);
    document.getElementById('optFoxs').addEventListener('change', updateRolePreview);
    document.getElementById('optPoison').addEventListener('change', updateRolePreview);
    document.getElementById('optPobe').addEventListener('change', updateRolePreview);

    // GM Trip 可見性切換
    document.getElementById('optGmEnabled').addEventListener('change', function() {
      document.getElementById('gmTripRow').style.display = this.checked ? 'block' : 'none';
    });

    // 自訂替身可見性切換
    document.getElementById('optCustDummy').addEventListener('change', function() {
      const visible = this.checked;
      document.getElementById('custDummyRow').style.display = visible ? 'block' : 'none';
      if (!visible) {
        document.getElementById('optDummyCustomName').value = '';
        document.getElementById('optDummyCustomLastWords').value = '';
      }
    });

    // 頁面載入
    window.addEventListener('load', () => {
      updateRolePreview();
      loadRoomList();
    });

    // ===== 主功能 =====

    function showError(message) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('show', show);
    }

    async function loadRoomList() {
      try {
        const res = await fetch(`${API_BASE}/api/rooms`);
        const data = await res.json();
        const container = document.getElementById('roomListContent');
        if (!data.rooms || data.rooms.length === 0) {
          container.innerHTML = '<span style="color:#aaa;">目前沒有等待中的房間</span>';
          return;
        }
        const statusMap = { waiting: '🟢 等待中', playing: '🔴 遊戲中', finished: '⚫ 已結束' };
        container.innerHTML = data.rooms.map(r => `
          <div style="background:#f8f9fa;border-radius:8px;padding:10px 14px;margin-bottom:8px;text-align:left;cursor:pointer;" onclick="document.getElementById('joinRoomNo').value='${r.room_no}';document.getElementById('username').focus();">
            <div style="font-weight:600;color:#333;font-size:14px;">${r.room_name || '未命名房間'}</div>
            <div style="font-size:12px;color:#888;margin-top:2px;">
              ${statusMap[r.status] || r.status} · ${r.player_count || 0}/${r.max_user}人 · ${r.is_private ? '🔒 私人' : '🌐 公開'}
              ${r.room_comment ? ' · ' + r.room_comment : ''}
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('roomListContent').innerHTML = '<span style="color:#ccc;">載入失敗</span>';
      }
    }

    async function createRoom() {
      const roomName = document.getElementById('roomName').value.trim();
      const roomComment = document.getElementById('roomComment').value.trim();
      const maxUser = parseInt(document.getElementById('maxUser').value);
      const iconNo = parseInt(document.getElementById('iconNo').value);
      const roomPassword = document.getElementById('roomPassword').value.trim();
      const timeLimit = parseInt(document.getElementById('timeLimit').value);
      const optionRole = getOptionRole();
      const gameOpts = getGameOptions();

      if (!roomName) {
        showError('請輸入房間名稱');
        return;
      }

      if (gameOpts.custDummy && !gameOpts.dummyBoy) {
        showError('啟用「自訂替身」前，請先勾選「替身君」');
        return;
      }

      showLoading(true);

      try {
        const response = await fetch(`${API_BASE}/api/rooms`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            roomName,
            roomComment,
            maxUser,
            gameOption: JSON.stringify(gameOpts),
            optionRole,
            password: roomPassword || undefined
          })
        });

        const data = await response.json();

        if (data.success) {
          // 房間建立成功，儲存房主密碼（如果有）
          if (roomPassword) {
            sessionStorage.setItem(`room_password_${data.roomNo}`, roomPassword);
          }
          // 以房主身份自動加入房間，取得 session
          const hostName = document.getElementById('username').value.trim() || '房主';
          const joinResp = await fetch(`${API_BASE}/api/rooms/${data.roomNo}/join`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              uname: hostName,
              handleName: hostName,
              trip: '',
              iconNo: iconNo,
              sex: 'male'
            })
          });
          const joinData = await joinResp.json();
          if (joinData.success) {
            localStorage.setItem(`session_${data.roomNo}`, joinData.sessionId);
            window.location.href = `/game.html?roomNo=${data.roomNo}&iconNo=${iconNo}&isHost=true`;
          } else {
            showError(joinData.error || '加入房間失敗');
          }
        } else {
          showError(data.error || '建立房間失敗');
        }
      } catch (error) {
        console.error('Create room error:', error);
        showError('網路錯誤，請稍後再試');
      } finally {
        showLoading(false);
      }
    }

    async function joinRoom() {
      const roomNo = document.getElementById('joinRoomNo').value.trim();
      const joinPassword = document.getElementById('joinPassword').value.trim();
      const username = document.getElementById('username').value.trim();
      const displayName = document.getElementById('displayName').value.trim();
      const tripcodePassword = document.getElementById('tripcodePassword').value;
      const wishRole = document.getElementById('wishRole').value;

      if (!roomNo || !username || !displayName) {
        showError('請填寫所有必填欄位');
        return;
      }

      showLoading(true);

      try {
        // 先檢查房間是否存在並驗證密碼
        const roomResponse = await fetch(`${API_BASE}/api/rooms/${roomNo}`);
        if (!roomResponse.ok) {
          showError('房間不存在');
          showLoading(false);
          return;
        }

        const roomData = await roomResponse.json();

        // 檢查是否為私人房間
        if (roomData.is_private && roomData.password !== joinPassword) {
          showError('房間密碼錯誤');
          showLoading(false);
          return;
        }

        // 生成 tripcode（如果有密碼）
        let trip = '';
        if (tripcodePassword) {
          const tripResponse = await fetch(`${API_BASE}/api/trip`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: tripcodePassword })
          });
          const tripData = await tripResponse.json();
          trip = tripData.trip || '';
        }

        // 加入房間
        const response = await fetch(`${API_BASE}/api/rooms/${roomNo}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            uname: username,
            handleName: displayName,
            trip,
            iconNo: 1,
            sex: 'male',
            wishRole,
            password: joinPassword
          })
        });

        const data = await response.json();

        if (data.success) {
          // 加入成功，儲存 session 和密碼
          localStorage.setItem(`session_${roomNo}`, data.sessionId);
          if (joinPassword) {
            sessionStorage.setItem(`room_password_${roomNo}`, joinPassword);
          }
          window.location.href = `/game.html?roomNo=${roomNo}`;
        } else {
          showError(data.error || '加入房間失敗');
        }
      } catch (error) {
        console.error('Join room error:', error);
        showError('網路錯誤，請稍後再試');
      } finally {
        showLoading(false);
      }
    }

    // 頁面載入時檢查 URL 參數
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const roomNo = params.get('roomNo');

      if (roomNo) {
        // 預填房間編號
        document.getElementById('joinRoomNo').value = roomNo;
      }
    });
  </script>
