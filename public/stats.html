<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人統計 - Werewolf CF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      text-align: center;
    }

    .search-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .search-box h2 {
      color: #1e3c72;
      margin-bottom: 20px;
    }

    .search-form {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 20px;
      border: 2px solid #667eea;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    .stats-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: none;
    }

    .stats-card.active {
      display: block;
    }

    .stats-header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }

    .stats-header h2 {
      color: #1e3c72;
      margin-bottom: 10px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      color: white;
    }

    .stat-box.wins {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .stat-box.survival {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .stat-box.score {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }

    .stat-value {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .win-rates {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .win-rate-card {
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      text-align: center;
    }

    .win-rate-card h3 {
      color: #1e3c72;
      margin-bottom: 15px;
    }

    .win-rate-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .win-rate-count {
      font-size: 14px;
      color: #666;
    }

    .human-win { color: #1976d2; }
    .wolf-win { color: #c62828; }
    .fox-win { color: #7b1fa2; }

    .role-history {
      margin-top: 20px;
    }

    .role-history h3 {
      color: #1e3c72;
      margin-bottom: 15px;
    }

    .role-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .role-item {
      padding: 10px 20px;
      background: #f8f9fa;
      border-radius: 20px;
      border: 2px solid #667eea;
    }

    .role-name {
      font-weight: bold;
      color: #1e3c72;
    }

    .role-count {
      color: #667eea;
      font-weight: bold;
    }

    .back-link {
      display: inline-block;
      padding: 10px 20px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 6px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .back-link:hover {
      background: #f8f9fa;
      transform: translateX(-5px);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .error {
      background: #ffebee;
      padding: 20px;
      border-radius: 8px;
      color: #c62828;
      text-align: center;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 20px;
      background: white;
      border: 2px solid #667eea;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tab.active {
      background: #667eea;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .leaderboard-table th,
    .leaderboard-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }

    .leaderboard-table th {
      background: #667eea;
      color: white;
      font-weight: bold;
    }

    .leaderboard-table tr:hover {
      background: #f8f9fa;
    }

    .rank-1 { color: #FFD700; font-weight: bold; }
    .rank-2 { color: #C0C0C0; font-weight: bold; }
    .rank-3 { color: #CD7F32; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首頁</a>

    <div class="header">
      <h1>📊 個人統計</h1>
      <p>查看玩家的遊戲統計資料</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('search')">查詢玩家</div>
      <div class="tab" onclick="switchTab('leaderboard')">排行榜</div>
    </div>

    <!-- 查詢玩家 -->
    <div id="searchTab" class="tab-content active">
      <div class="search-box">
        <h2>搜尋玩家統計</h2>
        <div class="search-form">
          <input type="text" id="tripInput" placeholder="輸入 Tripcode（例如：abc1234567）">
          <button onclick="searchStats()">搜尋</button>
        </div>
      </div>

      <div id="statsCard" class="stats-card">
        <div class="stats-header">
          <h2>🎮 Tripcode: <span id="tripDisplay"></span></h2>
          <p>最後遊玩：<span id="lastPlayed"></span></p>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="totalGames">0</div>
            <div class="stat-label">總場次</div>
          </div>
          <div class="stat-box wins">
            <div class="stat-value" id="totalWins">0</div>
            <div class="stat-label">總勝場</div>
          </div>
          <div class="stat-box survival">
            <div class="stat-value" id="survivalRate">0%</div>
            <div class="stat-label">生存率</div>
          </div>
          <div class="stat-box score">
            <div class="stat-value" id="score">0</div>
            <div class="stat-label">積分</div>
          </div>
        </div>

        <div class="win-rates">
          <div class="win-rate-card">
            <h3>村民勝率</h3>
            <div class="win-rate-value human-win" id="humanWinRate">0%</div>
            <div class="win-rate-count"><span id="humanWins">0</span> 勝</div>
          </div>
          <div class="win-rate-card">
            <h3>人狼勝率</h3>
            <div class="win-rate-value wolf-win" id="wolfWinRate">0%</div>
            <div class="win-rate-count"><span id="wolfWins">0</span> 勝</div>
          </div>
          <div class="win-rate-card">
            <h3>妖狐勝率</h3>
            <div class="win-rate-value fox-win" id="foxWinRate">0%</div>
            <div class="win-rate-count"><span id="foxWins">0</span> 勝</div>
          </div>
        </div>

        <div class="role-history">
          <h3>🎭 角色歷史</h3>
          <div class="role-list" id="roleList">
            <p class="loading">載入中...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 排行榜 -->
    <div id="leaderboardTab" class="tab-content">
      <div style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
        <select id="leaderboardType" onchange="loadLeaderboard()" style="padding: 10px; border-radius: 6px; border: 2px solid #667eea;">
          <option value="score">積分排行</option>
          <option value="games">場次排行</option>
          <option value="wins">勝場排行</option>
        </select>
      </div>

      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>排名</th>
            <th>Tripcode</th>
            <th>積分</th>
            <th>場次</th>
            <th>村民勝</th>
            <th>人狼勝</th>
            <th>妖狐勝</th>
            <th>生存率</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr>
            <td colspan="8" class="loading">載入中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // 切換 Tab
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      if (tab === 'search') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('searchTab').classList.add('active');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('leaderboardTab').classList.add('active');
        loadLeaderboard();
      }
    }

    // 搜尋統計
    async function searchStats() {
      const trip = document.getElementById('tripInput').value.trim();
      if (!trip) {
        alert('請輸入 Tripcode');
        return;
      }

      try {
        const response = await fetch(`/api/stats/${trip}`);
        const data = await response.json();

        displayStats(data);
      } catch (error) {
        console.error('Failed to load stats:', error);
        alert('載入統計失敗');
      }
    }

    // 顯示統計
    function displayStats(stats) {
      document.getElementById('tripDisplay').textContent = stats.trip;

      if (stats.last_played) {
        document.getElementById('lastPlayed').textContent =
          new Date(stats.last_played).toLocaleString('zh-TW');
      } else {
        document.getElementById('lastPlayed').textContent = '無資料';
      }

      const totalGames = stats.total_games || 0;
      const totalWins = (stats.human_wins || 0) + (stats.wolf_wins || 0) + (stats.fox_wins || 0);

      document.getElementById('totalGames').textContent = totalGames;
      document.getElementById('totalWins').textContent = totalWins;
      document.getElementById('score').textContent = stats.score || 0;

      // 生存率
      if (totalGames > 0) {
        const survivalRate = ((stats.survivor_count || 0) / totalGames * 100).toFixed(1);
        document.getElementById('survivalRate').textContent = survivalRate + '%';
      } else {
        document.getElementById('survivalRate').textContent = '0%';
      }

      // 勝率
      if (totalGames > 0) {
        const humanWinRate = ((stats.human_wins || 0) / totalGames * 100).toFixed(1);
        const wolfWinRate = ((stats.wolf_wins || 0) / totalGames * 100).toFixed(1);
        const foxWinRate = ((stats.fox_wins || 0) / totalGames * 100).toFixed(1);

        document.getElementById('humanWinRate').textContent = humanWinRate + '%';
        document.getElementById('wolfWinRate').textContent = wolfWinRate + '%';
        document.getElementById('foxWinRate').textContent = foxWinRate + '%';
      }

      document.getElementById('humanWins').textContent = stats.human_wins || 0;
      document.getElementById('wolfWins').textContent = stats.wolf_wins || 0;
      document.getElementById('foxWins').textContent = stats.fox_wins || 0;

      // 角色歷史
      const roleList = document.getElementById('roleList');
      if (stats.roleHistory && Object.keys(stats.roleHistory).length > 0) {
        roleList.innerHTML = Object.entries(stats.roleHistory).map(([role, count]) => `
          <div class="role-item">
            <span class="role-name">${getRoleName(role)}</span>
            <span class="role-count">× ${count}</span>
          </div>
        `).join('');
      } else {
        roleList.innerHTML = '<p>無角色歷史記錄</p>';
      }

      document.getElementById('statsCard').classList.add('active');
    }

    // 載入排行榜
    async function loadLeaderboard() {
      const type = document.getElementById('leaderboardType').value;

      try {
        const response = await fetch(`/api/leaderboard?type=${type}&limit=50`);
        const data = await response.json();

        displayLeaderboard(data.leaderboard || []);
      } catch (error) {
        console.error('Failed to load leaderboard:', error);
        document.getElementById('leaderboardBody').innerHTML =
          '<tr><td colspan="8" class="error">載入失敗</td></tr>';
      }
    }

    // 顯示排行榜
    function displayLeaderboard(leaderboard) {
      if (leaderboard.length === 0) {
        document.getElementById('leaderboardBody').innerHTML =
          '<tr><td colspan="8">無資料</td></tr>';
        return;
      }

      document.getElementById('leaderboardBody').innerHTML = leaderboard.map((player, index) => {
        const rank = index + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const totalGames = player.total_games || 0;
        const survivalRate = totalGames > 0
          ? ((player.survivor_count || 0) / totalGames * 100).toFixed(1) + '%'
          : '0%';

        return `
          <tr>
            <td class="${rankClass}">#${rank}</td>
            <td><code>${player.trip}</code></td>
            <td><strong>${player.score || 0}</strong></td>
            <td>${totalGames}</td>
            <td>${player.human_wins || 0}</td>
            <td>${player.wolf_wins || 0}</td>
            <td>${player.fox_wins || 0}</td>
            <td>${survivalRate}</td>
          </tr>
        `;
      }).join('');
    }

    // 獲取角色名稱
    function getRoleName(role) {
      const names = {
        human: '村民',
        wolf: '人狼',
        seer: '預言家',
        medium: '靈媒',
        hunter: '獵人',
        common: '共有者',
        mad: '狂人',
        fox: '妖狐',
        child_fox: '子狐',
        traitor: '背德者'
      };
      return names[role] || role;
    }

    // Enter 鍵搜尋
    document.getElementById('tripInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchStats();
      }
    });
  </script>
</body>
</html>
