name = "werewolf-cf"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# 本地開發
[env.development]
vars = { ENVIRONMENT = "development" }

# 生產環境
[env.production]
vars = { ENVIRONMENT = "production" }

# D1 資料庫
[[d1_databases]]
binding = "DB"
database_name = "werewolf-db"
# database_id = "YOUR_DATABASE_ID" # 在部署後更新

# KV 命名空間
[[kv_namespaces]]
binding = "KV"
# id = "YOUR_KV_NAMESPACE_ID" # 在部署後更新

# R2 儲存
[[r2_buckets]]
binding = "R2"
bucket_name = "werewolf-uploads"

# 靜態資源（Assets）
[assets]
directory = "./public"
binding = "ASSETS"

# Durable Objects
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

# Workers AI (可選，用於未來功能)
# [ai]
# binding = "AI"

# 路由（生產環境）
# [[routes]]
# pattern = "werewolf.example.com/*"
# zone_name = "example.com"

# ==================== 新增配置 ====================

# 速率限制配置
[env.production.rate_limits]
api_requests = 100
window_ms = 60000

# 管理員配置
[env.production.admin]
session_ttl = 3600000 # 1 小時
max_login_attempts = 5

# 封鎖配置
[env.production.bans]
default_duration = 3600000 # 1 小時
max_bans = 1000

# 統計配置
[env.production.stats]
update_interval = 60000 # 1 分鐘
history_days = 30
