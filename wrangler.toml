name = "werewolf-cf"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# 本地開發
[env.development]
vars = { ENVIRONMENT = "development" }

# 生產環境
[env.production]
vars = { ENVIRONMENT = "production" }

# D1 資料庫
[[d1_databases]]
binding = "DB"
database_name = "werewolf-db"
database_id = "local"  # 本地開發用

# KV 命名空間
[[kv_namespaces]]
binding = "KV"
id = "local"  # 本地開發用

# R2 儲存
[[r2_buckets]]
binding = "R2"
bucket_name = "werewolf-uploads"

# 靜態資源（Assets）
[assets]
directory = "./public"
binding = "ASSETS"

# Durable Objects
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

# Workers AI (可選，用於未來功能)
# [ai]
# binding = "AI"

# 路由（生產環境）
# [[routes]]
# pattern = "werewolf.example.com/*"
# zone_name = "example.com"
