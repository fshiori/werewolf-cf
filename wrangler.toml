name = "werewolf-cf"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# 開發環境配置
[env.development]
vars = { ENVIRONMENT = "development" }

# 生產環境配置
[env.production]
vars = { ENVIRONMENT = "production" }

# D1 資料庫
[[d1_databases]]
binding = "DB"
database_name = "werewolf-db"
database_id = "local"  # 本地開發用

# KV 命名空間
[[kv_namespaces]]
binding = "KV"
id = "local"  # 本地開發用

# R2 儲存（頭像上傳）
[[r2_buckets]]
binding = "R2"
bucket_name = "werewolf-uploads"

# Durable Objects
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

# Durable Objects migrations
[[migrations]]
tag = "v1"
new_classes = ["Room"]
