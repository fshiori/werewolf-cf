name = "werewolf-cf"
main = "src/index.ts"
compatibility_date = "2024-01-01"
account_id = "4fae982a30d8f623b835b46bba03e72c"

# 本地開發
[env.development]
vars = { ENVIRONMENT = "development" }

# 生產環境
[env.production]
vars = { ENVIRONMENT = "production" }

# D1 資料庫
[[d1_databases]]
binding = "DB"
database_name = "werewolf-db"
database_id = "ca544085-450c-4ec9-b1fa-58b96bbdfc56"

# KV 命名空間
[[kv_namespaces]]
binding = "KV"
id = "86cee32e168848aebafdb2666127a316"

# R2 儲存
[[r2_buckets]]
binding = "R2"
bucket_name = "werewolf-uploads"

# 靜態資源（Assets）
[assets]
directory = "./public"
binding = "ASSETS"

# Durable Objects
[[durable_objects.bindings]]
name = "WEREWOLF_ROOM"
class_name = "WerewolfRoom"

# Cron Trigger — 每 15 分鐘掃描殘留房間
[triggers]
crons = ["*/15 * * * *"]

# Migrations - 初始化 SQLite storage
[[migrations]]
tag = "v1"
new_sqlite_classes = ["WerewolfRoom"]

# Workers AI (可選，用於未來功能)
# [ai]
# binding = "AI"

# 路由（生產環境）
# [[routes]]
# pattern = "werewolf.example.com/*"
# zone_name = "example.com"

# ==================== 新增配置 ====================

# 速率限制配置
[env.production.rate_limits]
api_requests = 100
window_ms = 60000

# 管理員配置
[env.production.admin]
session_ttl = 3600000 # 1 小時
max_login_attempts = 5

# 封鎖配置
[env.production.bans]
default_duration = 3600000 # 1 小時
max_bans = 1000

# 統計配置
[env.production.stats]
update_interval = 60000 # 1 分鐘
history_days = 30

# 聯合列表配置（跨站聚合）
# JSON array of { name, url } — url 指向同類 Werewolf CF 實例
# 每個源需要有 /api/rooms endpoint
[vars]
FEDERATED_SOURCES = '[{"name":"示範站 A","url":"https://werewolf-a.example.com"},{"name":"示範站 B","url":"https://werewolf-b.example.com"}]'
